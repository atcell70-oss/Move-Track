<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moving & Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{min-height:100vh}
body{background:#080a0d;color:#d4dde8}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(201,168,76,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
#root{position:relative;z-index:1}
select{-webkit-appearance:none;appearance:none}
.pcol{-ms-overflow-style:none;scrollbar-width:none}
.pcol::-webkit-scrollbar{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes rp{0%,100%{background:rgba(231,76,60,0.07)}50%{background:rgba(231,76,60,0.13)}}
@keyframes alertpulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,0.2)}50%{box-shadow:0 0 8px 2px rgba(231,76,60,0.15)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
firebase.initializeApp({databaseURL:"https://move---track-default-rtdb.europe-west1.firebasedatabase.app"});
const db = firebase.database();

const DEFAULT_LOCS = ["WHITEHOUSE","BEB","BDL","OUT"];
const STATUSES = ["IN","OUT","R&R","MEDICAL","TASKING"];
const PAL = ["#c9a84c","#3498db","#2ecc71","#9b59b6","#e74c3c","#e67e22","#1abc9c","#e91e63","#00bcd4","#8bc34a"];
const SCOL = {
  IN:{color:"#2ecc71",bg:"rgba(46,204,113,0.15)"},
  OUT:{color:"#e74c3c",bg:"rgba(231,76,60,0.15)"},
  "R&R":{color:"#3498db",bg:"rgba(52,152,219,0.15)"},
  MEDICAL:{color:"#f39c12",bg:"rgba(243,156,18,0.15)"},
  TASKING:{color:"#9b59b6",bg:"rgba(155,89,182,0.15)"},
  "":{color:"#5a6a7a",bg:"transparent"},
};
const MONTHS=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

const pad = n => String(n).padStart(2,"0");
const bhrNow = () => { const n=new Date(),h=(n.getUTCHours()+3)%24; return `${pad(h)}:${pad(n.getUTCMinutes())}:${pad(n.getUTCSeconds())}`; };
const zuluNow = () => { const n=new Date(); return `${pad(n.getUTCHours())}:${pad(n.getUTCMinutes())}:${pad(n.getUTCSeconds())}`; };
const nowMins = () => { const n=new Date(); return ((n.getUTCHours()+3)%24)*60+n.getUTCMinutes(); };
const toMins = t => { if(!t||!t.includes(":"))return null; const[h,m]=t.split(":").map(Number); return h*60+m; };
const isOvd = r => {
  if(!r||!r.dueBack||r.status==="IN"||!r.status)return false;
  const now=new Date();
  const nowBhr=new Date(now.getTime()+3*3600000);
  if(r.dueDate){
    const[d,mo]=r.dueDate.split("/").map(Number);
    const dueD=new Date(Date.UTC(nowBhr.getUTCFullYear(),mo-1,d));
    const todayD=new Date(Date.UTC(nowBhr.getUTCFullYear(),nowBhr.getUTCMonth(),nowBhr.getUTCDate()));
    if(dueD>todayD)return false;
    if(dueD<todayD)return true;
  }
  const m=toMins(r.dueBack); return m!==null&&nowMins()>m;
};
const ovdStr = r => { const d=nowMins()-toMins(r.dueBack),h=Math.floor(d/60),m=d%60; return h>0?`+${h}H ${m}M`:`+${m}M`; };

const {useState,useEffect,useRef} = React;

// ── TIME + DATE PICKER ──
function TimePicker({time, date, onConfirm, onClear, onClose}){
  const [h, setH] = React.useState(parseInt((time||"00:00").split(":")[0])||0);
  const [m, setM] = React.useState(parseInt((time||"00:00").split(":")[1])||0);
  const now = new Date(new Date().getTime()+3*3600000);
  const [day, setDay] = React.useState(date?parseInt(date.split("/")[0]):now.getUTCDate());
  const [mon, setMon] = React.useState(date?parseInt(date.split("/")[1])-1:now.getUTCMonth());

  const daysInMonth = new Date(Date.UTC(now.getUTCFullYear(),mon+1,0)).getUTCDate();
  const days = Array.from({length:daysInMonth},(_,i)=>i+1);

  const fnt = "'Share Tech Mono',monospace";
  const btnStyle = (sel) => ({
    background:sel?"rgba(201,168,76,0.2)":"#080a0d",
    border:`1px solid ${sel?"#c9a84c":"#1e2630"}`,
    color:sel?"#c9a84c":"#5a6a7a",
    fontFamily:fnt,fontSize:"12px",padding:"6px 8px",
    cursor:"pointer",minWidth:"40px",letterSpacing:"1px"
  });
  const lbl = {fontSize:"9px",color:"#5a6a7a",letterSpacing:"3px",marginBottom:"8px"};

  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px",overflowY:"auto"}}>
      <div style={{background:"#0f1318",border:"1px solid #c9a84c",width:"100%",maxWidth:"380px",fontFamily:fnt}}>
        <div style={{background:"#0d1117",borderBottom:"1px solid #7a6330",padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:"#c9a84c",fontSize:"11px",letterSpacing:"3px"}}>DUE BACK — DATE & TIME (BHR)</span>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:"#5a6a7a",cursor:"pointer",fontSize:"18px",lineHeight:1}}>✕</button>
        </div>
        <div style={{padding:"16px 20px"}}>
          {/* Big display */}
          <div style={{textAlign:"center",fontSize:"36px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:"900",color:"#c9a84c",letterSpacing:"4px",marginBottom:"16px"}}>
            {pad(day)} {MONTHS[mon]} — {pad(h)}:{pad(m)}
          </div>

          {/* Month */}
          <div style={{marginBottom:"14px"}}>
            <div style={lbl}>MONTH</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
              {MONTHS.map((mo2,i)=>(
                <button key={i} onClick={()=>{setMon(i);const dim=new Date(Date.UTC(now.getUTCFullYear(),i+1,0)).getUTCDate();if(day>dim)setDay(dim);}} style={btnStyle(mon===i)}>{mo2}</button>
              ))}
            </div>
          </div>

          {/* Day */}
          <div style={{marginBottom:"14px"}}>
            <div style={lbl}>DAY</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
              {days.map(d=>(
                <button key={d} onClick={()=>setDay(d)} style={btnStyle(day===d)}>{pad(d)}</button>
              ))}
            </div>
          </div>

          {/* Hour */}
          <div style={{marginBottom:"14px"}}>
            <div style={lbl}>HOUR</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
              {Array.from({length:24},(_,i)=>i).map(hh=>(
                <button key={hh} onClick={()=>setH(hh)} style={btnStyle(h===hh)}>{pad(hh)}</button>
              ))}
            </div>
          </div>

          {/* Minute */}
          <div style={{marginBottom:"20px"}}>
            <div style={lbl}>MINUTE</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
              {[0,5,10,15,20,25,30,35,40,45,50,55].map(mm=>(
                <button key={mm} onClick={()=>setM(mm)} style={btnStyle(m===mm)}>{pad(mm)}</button>
              ))}
            </div>
          </div>

          {/* Actions */}
          <div style={{display:"flex",gap:"8px"}}>
            <button onClick={onClear} style={{flex:1,background:"rgba(231,76,60,0.1)",border:"1px solid rgba(231,76,60,0.4)",color:"#e74c3c",fontFamily:fnt,fontSize:"12px",letterSpacing:"2px",padding:"10px",cursor:"pointer"}}>CLEAR</button>
            <button onClick={()=>onConfirm(pad(h)+":"+pad(m), pad(day)+"/"+pad(mon+1))} style={{flex:2,background:"rgba(201,168,76,0.15)",border:"1px solid #c9a84c",color:"#c9a84c",fontFamily:fnt,fontSize:"12px",letterSpacing:"2px",padding:"10px",cursor:"pointer"}}>CONFIRM</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── WH SHIFTS TAB ──
const DAYS_WH = ["SAT","SUN","MON","TUE","WED","THU","FRI"];
const MONTHS_WH = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const WH_PIN = "0121";

function DayCard({dayLabel,date,month,dayKey,weekKey,dayData,boardNames,vehicleList,writeWH,s,f,unlocked}){
  // Initialize from Firebase data once — never re-sync to avoid wipe on selection
  const [data,setData] = useState(()=>dayData||{});
  const prevWeekKey = useRef(weekKey);

  // Only reset when week changes, not on every Firebase update
  useEffect(()=>{
    if(prevWeekKey.current!==weekKey){
      setData(dayData||{});
      prevWeekKey.current=weekKey;
    }
  },[weekKey]);

  // When Firebase first loads data for this day (was empty), populate it
  useEffect(()=>{
    if(dayData&&Object.keys(dayData).length>0&&Object.keys(data).length===0){
      setData(dayData);
    }
  },[]);

  const set = (field,val) => {
    if(!unlocked)return;
    setData(prev=>({...prev,[field]:val}));
    writeWH(weekKey,dayKey,field,val);
  };

  const nd = {appearance:"none",WebkitAppearance:"none",background:"#080a0d",border:"1px solid #1e2630",color:"#fff",fontFamily:f.mono,fontSize:"11px",padding:"5px 7px",cursor:unlocked?"pointer":"not-allowed",outline:"none",width:"100%",minWidth:"130px",borderRadius:"0",opacity:unlocked?1:0.5};
  const vd = {...nd,color:"#c9a84c",borderColor:"#c9a84c33"};

  const ND = ({fld,placeholder}) => (
    <select value={data[fld]||""} onChange={e=>{if(unlocked)set(fld,e.target.value);}} disabled={!unlocked} style={{...nd,color:data[fld]?"#fff":"#5a6a7a"}}>
      <option value="">{placeholder||"— SELECT —"}</option>
      {boardNames.map(n=><option key={n} value={n}>{n}</option>)}
    </select>
  );

  const VD = ({fld}) => (
    <select value={data[fld]||""} onChange={e=>{if(unlocked)set(fld,e.target.value);}} disabled={!unlocked} style={{...vd,color:data[fld]?"#c9a84c":"#5a6a7a"}}>
      <option value="">— SELECT VEH —</option>
      {vehicleList.map(v=><option key={v.value} value={v.value}>{v.label}</option>)}
    </select>
  );

  const sh = {fontSize:"9px",color:"#c9a84c",letterSpacing:"3px",margin:"12px 0 7px"};
  const fr = {display:"flex",gap:"8px",marginBottom:"7px",alignItems:"center",flexWrap:"wrap"};
  const lb = {fontSize:"9px",color:"#5a6a7a",letterSpacing:"2px",minWidth:"75px",flexShrink:0};
  const pl = {fontSize:"9px",color:"#5a6a7a",letterSpacing:"2px",marginBottom:"6px"};

  return (
    <div style={{background:"#0f1318",border:"1px solid #1e2630",padding:"14px 16px",marginBottom:"12px"}}>
      <div style={{display:"flex",alignItems:"baseline",gap:"10px",borderBottom:"1px solid #1e2630",paddingBottom:"10px",marginBottom:"4px"}}>
        <span style={{fontFamily:f.sans,fontWeight:"900",fontSize:"22px",color:"#c9a84c",letterSpacing:"3px"}}>{dayLabel}</span>
        <span style={{fontFamily:f.mono,fontSize:"12px",color:"#5a6a7a",letterSpacing:"2px"}}>{date} {month}</span>
      </div>

      <div style={sh}>WH SHIFT</div>
      <div style={fr}><span style={lb}>PERSON 1</span><ND fld="shift1" placeholder="— SELECT —"/></div>
      <div style={fr}><span style={lb}>PERSON 2</span><ND fld="shift2" placeholder="— SELECT —"/></div>

      <div style={sh}>COURIER</div>
      <div style={fr}><span style={lb}>PERSON</span><ND fld="courierPerson"/></div>
      <div style={fr}><span style={lb}>VEHICLE</span><VD fld="courierVeh"/></div>
      <div style={pl}>PAX (UP TO 4)</div>
      <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"4px"}}>
        {[1,2,3,4].map(n=><ND key={n} fld={"courierPax"+n} placeholder={"PAX "+n}/>)}
      </div>

      <div style={sh}>ESCORT</div>
      <div style={fr}><span style={lb}>PERSON</span><ND fld="escortPerson"/></div>
      <div style={fr}><span style={lb}>VEHICLE</span><VD fld="escortVeh"/></div>
      <div style={pl}>PAX (UP TO 4)</div>
      <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"4px"}}>
        {[1,2,3,4].map(n=><ND key={n} fld={"escortPax"+n} placeholder={"PAX "+n}/>)}
      </div>
    </div>
  );
}

function WHTab({whShifts,writeWH,weekStart,setWeekStart,boardNames,vehicleList,s,f}){
  const [unlocked,setUnlocked] = useState(false);
  const [pin,setPin] = useState("");
  const [pinErr,setPinErr] = useState(false);

  const weekKey = "w"+weekStart;
  const weekDates = Array.from({length:7},(_,i)=>{
    const d=new Date(weekStart+i*86400000);
    return{label:DAYS_WH[i],date:d.getUTCDate(),month:MONTHS_WH[d.getUTCMonth()],key:DAYS_WH[i].toLowerCase()};
  });
  const startD=weekDates[0],endD=weekDates[6];

  const tryUnlock = () => {
    if(pin===WH_PIN){setUnlocked(true);setPin("");setPinErr(false);}
    else{setPinErr(true);setPin("");}
  };

  const fnt = f.mono;
  const pinBtn = (n) => (
    <button key={n} onClick={()=>setPin(p=>p.length<4?p+n:p)}
      style={{background:"#0f1318",border:"1px solid #1e2630",color:"#d4dde8",fontFamily:fnt,fontSize:"20px",fontWeight:"bold",width:"70px",height:"60px",cursor:"pointer",letterSpacing:"1px"}}>
      {n}
    </button>
  );

  return <>
    <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"16px",flexWrap:"wrap"}}>
      <button onClick={()=>setWeekStart(w=>w-7*86400000)} style={{background:"#0f1318",border:"1px solid #1e2630",color:"#c9a84c",fontFamily:fnt,fontSize:"12px",padding:"7px 14px",cursor:"pointer"}}>◀ PREV</button>
      <div style={{color:"#fff",fontFamily:f.sans,fontSize:"18px",fontWeight:"900",letterSpacing:"3px"}}>
        {startD.date} {startD.month} — {endD.date} {endD.month}
      </div>
      <button onClick={()=>setWeekStart(w=>w+7*86400000)} style={{background:"#0f1318",border:"1px solid #1e2630",color:"#c9a84c",fontFamily:fnt,fontSize:"12px",padding:"7px 14px",cursor:"pointer"}}>NEXT ▶</button>
      {unlocked
        ? <span style={{color:"#2ecc71",fontFamily:fnt,fontSize:"10px",letterSpacing:"2px",marginLeft:"8px"}}>🔓 UNLOCKED</span>
        : <span style={{color:"#e74c3c",fontFamily:fnt,fontSize:"10px",letterSpacing:"2px",marginLeft:"8px"}}>🔒 READ ONLY</span>
      }
      {unlocked&&<button onClick={()=>setUnlocked(false)} style={{background:"rgba(231,76,60,0.1)",border:"1px solid rgba(231,76,60,0.3)",color:"#e74c3c",fontFamily:fnt,fontSize:"10px",letterSpacing:"2px",padding:"5px 10px",cursor:"pointer"}}>LOCK</button>}
    </div>

    {/* PIN pad if locked */}
    {!unlocked&&<div style={{background:"#0f1318",border:"1px solid #1e2630",padding:"20px",marginBottom:"20px",maxWidth:"280px"}}>
      <div style={{fontSize:"10px",color:"#c9a84c",letterSpacing:"3px",marginBottom:"16px"}}>ENTER PIN TO EDIT</div>
      {/* PIN display */}
      <div style={{display:"flex",gap:"10px",justifyContent:"center",marginBottom:"16px"}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:"40px",height:"40px",border:`1px solid ${pin.length>i?"#c9a84c":"#1e2630"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",color:"#c9a84c"}}>
            {pin.length>i?"●":""}
          </div>
        ))}
      </div>
      {pinErr&&<div style={{color:"#e74c3c",fontSize:"10px",letterSpacing:"2px",textAlign:"center",marginBottom:"10px"}}>INCORRECT PIN</div>}
      {/* Number pad */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,70px)",gap:"8px",justifyContent:"center"}}>
        {[1,2,3,4,5,6,7,8,9].map(n=>pinBtn(String(n)))}
        <button onClick={()=>setPin(p=>p.slice(0,-1))} style={{background:"#0f1318",border:"1px solid #e74c3c44",color:"#e74c3c",fontFamily:fnt,fontSize:"14px",width:"70px",height:"60px",cursor:"pointer"}}>⌫</button>
        {pinBtn("0")}
        <button onClick={tryUnlock} style={{background:"rgba(201,168,76,0.15)",border:"1px solid #c9a84c",color:"#c9a84c",fontFamily:fnt,fontSize:"12px",letterSpacing:"1px",width:"70px",height:"60px",cursor:"pointer"}}>OK</button>
      </div>
    </div>}

    {weekDates.map(({label,date,month,key})=>(
      <DayCard
        key={weekKey+key}
        dayLabel={label} date={date} month={month}
        dayKey={key} weekKey={weekKey}
        dayData={(whShifts[weekKey]||{})[key]||{}}
        boardNames={boardNames}
        vehicleList={vehicleList}
        writeWH={writeWH}
        unlocked={unlocked}
        s={s} f={f}
      />
    ))}
  </>;
}

// ── MAIN APP ──
function App(){
  const [rows,setRows] = useState(()=>Array.from({length:100},(_,i)=>({id:i+1,name:"",location:"",status:"",dueBack:"",dueDate:"",notes:""})));
  const [locs,setLocs] = useState(DEFAULT_LOCS);
  const [vehicles,setVehicles] = useState(()=>Array.from({length:100},(_,i)=>({id:i+1,make:"",model:"",colour:"",vrn:"",name:""})));
  const [fuelCards,setFuelCards] = useState(()=>Array.from({length:30},(_,i)=>({id:i+1,cardnum:"",name:""})));
  const [tab,setTab] = useState("board");
  const [newLoc,setNewLoc] = useState("");
  const [bhr,setBhr] = useState(bhrNow());
  const [zulu,setZulu] = useState(zuluNow());
  const [connected,setConnected] = useState(false);
  const [picker,setPicker] = useState(null);
  const [whShifts,setWhShifts] = useState({});
  const [weekStart,setWeekStart] = useState(()=>{
    const n=new Date(new Date().getTime()+3*3600000);
    const day=n.getUTCDay();
    const diff=(day===6)?0:(day+1)%7;
    const sat=new Date(Date.UTC(n.getUTCFullYear(),n.getUTCMonth(),n.getUTCDate()-diff));
    return sat.getTime();
  });
  const [dragSrc,setDragSrc] = useState(null);
  const [dragOver,setDragOver] = useState(null);
  const rowsRef = useRef(rows);
  rowsRef.current = rows;

  useEffect(()=>{
    const clk = setInterval(()=>{setBhr(bhrNow());setZulu(zuluNow());},1000);
    const boardRef = db.ref("board");
    boardRef.on("value",snap=>{
      const data=snap.val()||{};
      setRows(Array.from({length:100},(_,i)=>({id:i+1,name:"",location:"",status:"",dueBack:"",dueDate:"",notes:"",...(data[i]||{})})));
      setConnected(true);
    });
    const locRef = db.ref("locations");
    locRef.on("value",snap=>{ const v=snap.val(); if(Array.isArray(v)&&v.length>0)setLocs(v); });
    const vRef = db.ref("vehicles");
    vRef.on("value",snap=>{
      const data=snap.val()||{};
      setVehicles(Array.from({length:100},(_,i)=>({id:i+1,make:"",model:"",colour:"",vrn:"",name:"",...(data[i]||{})})));
    });
    const fcRef = db.ref("fuelcards");
    fcRef.on("value",snap=>{
      const data=snap.val()||{};
      setFuelCards(Array.from({length:30},(_,i)=>({id:i+1,cardnum:"",name:"",notes:"",...(data[i]||{})})));
    });
    const whRef = db.ref("whshifts");
    whRef.on("value",snap=>{ setWhShifts(snap.val()||{}); });
    return()=>{clearInterval(clk);boardRef.off();locRef.off();vRef.off();fcRef.off();whRef.off();};
  },[]);

  const writeField = (i,field,value) => { const u={}; u[field]=value; db.ref("board/"+i).update(u); };
  const writeLocs = l => db.ref("locations").set(l);
  const writeAllRows = (newRows) => {
    const updates={};
    newRows.forEach((r,i)=>{ updates[i]={...r,id:i+1}; });
    db.ref("board").set(updates);
  };
  const writeVehicle = (i,field,value) => { const u={}; u[field]=value; db.ref("vehicles/"+i).update(u); };
  const writeFuelCard = (i,field,value) => { const u={}; u[field]=value; db.ref("fuelcards/"+i).update(u); };
  const writeWH = (weekKey,dayKey,field,value) => { const u={}; u[field]=value; db.ref("whshifts/"+weekKey+"/"+dayKey).update(u); };

  const updateRow = (i,field,val) => {
    setRows(prev=>{ const n=[...prev]; n[i]={...n[i],[field]:val}; if(field==="status"&&val==="IN"){n[i].dueBack="";n[i].dueDate="";} return n; });
    writeField(i,field,val);
    if(field==="status"&&val==="IN"){writeField(i,"dueBack","");writeField(i,"dueDate","");}
  };

  const addLoc = () => {
    const v=newLoc.trim().toUpperCase();
    if(!v||locs.includes(v))return;
    const next=[...locs,v]; setLocs(next); writeLocs(next); setNewLoc("");
  };
  const removeLoc = loc => {
    const next=locs.filter(l=>l!==loc); setLocs(next); writeLocs(next);
    rowsRef.current.forEach((r,i)=>{ if(r.location===loc)writeField(i,"location",""); });
  };

  const locColorMap = {};
  locs.forEach((l,i)=>{ const c=PAL[i%PAL.length]; locColorMap[l]={color:c,bg:c+"22"}; });
  locColorMap[""]={color:"#5a6a7a",bg:"transparent"};

  const sCounts={},lCounts={};let filled=0,odCount=0;
  rows.forEach(r=>{
    if(r.name)filled++;
    if(isOvd(r))odCount++;
    if(r.status)sCounts[r.status]=(sCounts[r.status]||0)+1;
    if(r.location)lCounts[r.location]=(lCounts[r.location]||0)+1;
  });
  const odRows = rows.filter(r=>r.name&&isOvd(r));

  const f = { mono:"'Share Tech Mono',monospace", sans:"'Barlow Condensed',sans-serif" };

  const s = {
    wrap:{background:"#080a0d",minHeight:"100vh",color:"#d4dde8",fontFamily:f.mono,fontSize:"13px"},
    header:{background:"#0d1117",borderBottom:"2px solid #c9a84c",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"12px"},
    title:{fontFamily:f.sans,fontWeight:"900",fontSize:"26px",letterSpacing:"5px",color:"#fff",textTransform:"uppercase"},
    gold:{color:"#c9a84c"},
    sub:{fontSize:"9px",color:"#5a6a7a",letterSpacing:"3px",marginTop:"3px",textTransform:"uppercase"},
    clockWrap:{textAlign:"right"},
    bhrClock:{fontFamily:f.sans,fontSize:"38px",fontWeight:"900",color:"#c9a84c",letterSpacing:"3px",lineHeight:"1"},
    bhrLbl:{fontSize:"9px",color:"#c9a84c",letterSpacing:"3px",marginTop:"2px"},
    zuluClock:{fontSize:"11px",color:"#5a6a7a",letterSpacing:"2px",marginTop:"4px"},
    filled:{color:"#c9a84c",fontSize:"11px",letterSpacing:"2px",marginTop:"4px"},
    tabs:{display:"flex",borderBottom:"1px solid #1e2630",background:"#0a0c0f",flexWrap:"wrap"},
    tab:a=>({background:a?"#0f1318":"transparent",border:"none",borderBottom:a?"2px solid #c9a84c":"2px solid transparent",color:a?"#c9a84c":"#5a6a7a",fontFamily:f.mono,fontSize:"11px",letterSpacing:"2px",padding:"11px 20px",cursor:"pointer",textTransform:"uppercase",marginBottom:"-1px"}),
    body:{padding:"14px 20px"},
    srow:{display:"flex",gap:"8px",marginBottom:"10px",flexWrap:"wrap"},
    sc:c=>({background:"#0f1318",border:`1px solid ${c}33`,padding:"7px 12px",display:"flex",alignItems:"center",gap:"7px"}),
    sn:c=>({fontSize:"20px",fontWeight:"bold",color:c,fontFamily:f.mono}),
    sl:{fontSize:"9px",color:"#5a6a7a",letterSpacing:"1px",textTransform:"uppercase"},
    alert:{background:"rgba(231,76,60,0.1)",border:"1px solid #e74c3c",borderLeft:"4px solid #e74c3c",padding:"10px 16px",marginBottom:"12px",animation:"alertpulse 1.5s infinite"},
    alertTitle:{color:"#e74c3c",fontSize:"10px",letterSpacing:"3px",marginBottom:"8px"},
    alertTag:{display:"inline-block",background:"rgba(231,76,60,0.2)",border:"1px solid rgba(231,76,60,0.5)",color:"#ff8a80",padding:"3px 8px",fontSize:"11px",marginRight:"6px",marginBottom:"4px"},
    tw:{background:"#0f1318",border:"1px solid #1e2630",overflowX:"auto"},
    th:{background:"#0d1117",borderBottom:"1px solid #7a6330",color:"#c9a84c",fontSize:"9px",letterSpacing:"3px",padding:"10px 12px",textAlign:"left",fontWeight:"normal",whiteSpace:"nowrap",textTransform:"uppercase"},
    td:{padding:"8px 12px",verticalAlign:"middle"},
    inp:{background:"transparent",border:"none",borderBottom:"1px solid #1e2630",color:"#fff",fontFamily:f.mono,fontSize:"12px",padding:"3px 4px",outline:"none",width:"100%",minWidth:"110px",textTransform:"uppercase"},
    sel:(val,map)=>({appearance:"none",WebkitAppearance:"none",background:map[val]?.bg||"#0a0c0f",border:`1px solid ${map[val]?.color||"#1e2630"}55`,color:map[val]?.color||"#5a6a7a",fontFamily:f.mono,fontSize:"11px",padding:"4px 6px",cursor:"pointer",outline:"none",width:"100%",borderRadius:"0"}),
    tBtn:dis=>({background:dis?"transparent":"#080a0d",border:`1px solid ${dis?"#1e2630":"#c9a84c55"}`,color:dis?"#2a3440":"#c9a84c",fontFamily:f.mono,fontSize:"11px",padding:"4px 7px",cursor:dis?"not-allowed":"pointer",letterSpacing:"1px",minWidth:"100px",textAlign:"center",lineHeight:"1.4"}),
    notesInp:{background:"transparent",border:"none",borderBottom:"1px solid transparent",color:"#5a6a7a",fontFamily:f.mono,fontSize:"11px",padding:"3px 4px",outline:"none",width:"100%",minWidth:"100px"},
    badge:{background:"#e74c3c",color:"#fff",fontSize:"8px",padding:"1px 5px",marginLeft:"4px",letterSpacing:"1px",verticalAlign:"middle"},
    odTime:{color:"#e74c3c",fontSize:"10px",marginLeft:"4px"},
    footer:{marginTop:"16px",paddingTop:"10px",borderTop:"1px solid #1e2630",fontSize:"10px",color:"#5a6a7a",letterSpacing:"1px",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"4px"},
    addRow:{display:"flex",gap:"8px",marginBottom:"6px"},
    addInp:{flex:"1",background:"#0f1318",border:"1px solid #1e2630",color:"#fff",fontFamily:f.mono,fontSize:"13px",padding:"9px 12px",outline:"none",textTransform:"uppercase"},
    addBtn:{background:"rgba(201,168,76,0.1)",border:"1px solid #c9a84c",color:"#c9a84c",fontFamily:f.mono,fontSize:"12px",letterSpacing:"2px",padding:"9px 16px",cursor:"pointer"},
    locGrid:{display:"flex",flexWrap:"wrap",gap:"8px",marginTop:"16px"},
    locChip:c=>({background:c+"14",border:`1px solid ${c}44`,color:c,fontFamily:f.mono,fontSize:"12px",letterSpacing:"1px",padding:"7px 12px",display:"flex",alignItems:"center",gap:"8px"}),
    rmBtn:{background:"transparent",border:"none",color:"#e74c3c",cursor:"pointer",fontSize:"14px",padding:"0",lineHeight:"1"},
    connecting:{textAlign:"center",padding:"60px 20px",color:"#5a6a7a",fontSize:"12px",letterSpacing:"3px",fontFamily:f.mono},
    hint:{marginBottom:"16px",fontSize:"11px",color:"#5a6a7a",letterSpacing:"1px"},
    secTitle:{margin:"18px 0 10px",fontSize:"10px",color:"#c9a84c",letterSpacing:"3px"},
    warnBox:{marginTop:"16px",background:"rgba(231,76,60,0.06)",border:"1px solid rgba(231,76,60,0.2)",padding:"10px 14px",fontSize:"11px",color:"#8a9aaa"},
    dragHandle:{color:"#2a3440",cursor:"grab",fontSize:"16px",padding:"0 4px",userSelect:"none",WebkitUserSelect:"none",touchAction:"none"},
    dragOver:{background:"rgba(201,168,76,0.08)",outline:"1px solid #c9a84c44"},
  };

  const SDEFS=[
    {key:"IN",label:"In Loc",color:"#2ecc71"},
    {key:"OUT",label:"Out",color:"#e74c3c"},
    {key:"R&R",label:"R&R",color:"#3498db"},
    {key:"MEDICAL",label:"Medical",color:"#f39c12"},
    {key:"TASKING",label:"Tasking",color:"#9b59b6"},
    {key:"TOTAL",label:"Total",color:"#c9a84c"},
    {key:"OVERDUE",label:"Overdue",color:"#e74c3c"},
  ];

  if(!connected) return (
    <div style={s.wrap}>
      <div style={s.header}>
        <div><div style={s.title}>MOVING <span style={s.gold}>&</span> TRACKING</div><div style={s.sub}>BDL Status Board // Live Personnel Tracking</div></div>
        <div style={s.clockWrap}><div style={s.bhrClock}>{bhr}</div><div style={s.bhrLbl}>BAHRAIN LOCAL</div><div style={s.zuluClock}>ZULU: {zulu}</div></div>
      </div>
      <div style={s.connecting}>
        <div style={{width:"30px",height:"30px",border:"2px solid #1e2630",borderTopColor:"#c9a84c",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 16px"}}/>
        CONNECTING TO DATABASE...
      </div>
    </div>
  );

  return (
    <div style={s.wrap}>
      <div style={s.header}>
        <div>
          <div style={s.title}>MOVING <span style={s.gold}>&</span> TRACKING</div>
          <div style={s.sub}>BDL Status Board // Live Personnel Tracking</div>
        </div>
        <div style={s.clockWrap}>
          <div style={s.bhrClock}>{bhr}</div>
          <div style={s.bhrLbl}>BAHRAIN LOCAL</div>
          <div style={s.zuluClock}>ZULU: {zulu}</div>
          <div style={s.filled}>{filled}/100 FILLED{odCount>0&&<span style={{color:"#e74c3c",marginLeft:"8px"}}>⚠ {odCount} OVERDUE</span>}</div>
        </div>
      </div>

      <div style={s.tabs}>
        <button style={s.tab(tab==="board")} onClick={()=>setTab("board")}>Board</button>
        <button style={s.tab(tab==="locs")} onClick={()=>setTab("locs")}>Locations ({locs.length})</button>
        <button style={s.tab(tab==="vehicles")} onClick={()=>setTab("vehicles")}>Vehicles</button>
        <button style={s.tab(tab==="fuelcards")} onClick={()=>setTab("fuelcards")}>Fuel Cards</button>
        <button style={s.tab(tab==="wh")} onClick={()=>setTab("wh")}>WH Shifts</button>
      </div>

      <div style={s.body}>

        {/* ── BOARD TAB ── */}
        {tab==="board"&&<>
          <div style={s.srow}>
            {SDEFS.map(({key,label,color})=>{
              const n=key==="TOTAL"?filled:key==="OVERDUE"?odCount:(sCounts[key]||0);
              return <div key={key} style={s.sc(color)}>
                <div style={{width:7,height:7,borderRadius:"50%",background:n>0?color:"#2a3440",flexShrink:0,boxShadow:key==="OVERDUE"&&n>0?`0 0 6px ${color}`:undefined}}/>
                <div><div style={s.sn(n>0?color:"#fff")}>{n}</div><div style={s.sl}>{label}</div></div>
              </div>;
            })}
          </div>
          <div style={{...s.srow,marginBottom:"14px"}}>
            {locs.map((l,i)=>{
              const c=PAL[i%PAL.length],n=lCounts[l]||0;
              return <div key={l} style={s.sc(c)}>
                <div style={{width:7,height:7,borderRadius:"50%",background:n>0?c:"#2a3440",flexShrink:0}}/>
                <div><div style={s.sn(n>0?c:"#fff")}>{n}</div><div style={s.sl}>{l}</div></div>
              </div>;
            })}
          </div>
          {odRows.length>0&&<div style={s.alert}>
            <div style={s.alertTitle}>⚠ OVERDUE PERSONNEL DETECTED</div>
            <div>{odRows.map((r,i)=><span key={i} style={s.alertTag}>{r.name} — {ovdStr(r)}</span>)}</div>
          </div>}
          <div style={s.tw}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr><th style={s.th}></th>{["#","Name","Location","Status","Due Back (BHR)","Notes"].map(h=><th key={h} style={s.th}>{h}</th>)}</tr></thead>
              <tbody>
                {rows.map((r,i)=>{
                  const od=isOvd(r);
                  const dis=r.status==="IN"||r.status==="";
                  const dueLabel = r.dueBack ? (r.dueDate ? r.dueDate+" "+r.dueBack : r.dueBack) : "— : —";
                  const isDragOver = dragOver===i;
                  return <tr key={i}
                    data-idx={i}
                    draggable
                    onDragStart={()=>setDragSrc(i)}
                    onDragOver={e=>{e.preventDefault();setDragOver(i);}}
                    onDragLeave={()=>setDragOver(null)}
                    onDrop={e=>{
                      e.preventDefault();
                      if(dragSrc===null||dragSrc===i){setDragSrc(null);setDragOver(null);return;}
                      const newRows=[...rowsRef.current];
                      const [moved]=newRows.splice(dragSrc,1);
                      newRows.splice(i,0,moved);
                      setRows(newRows);
                      writeAllRows(newRows);
                      setDragSrc(null);setDragOver(null);
                    }}
                    style={{background:isDragOver?"rgba(201,168,76,0.06)":od?"rgba(231,76,60,0.07)":"transparent",borderBottom:isDragOver?"1px solid #c9a84c44":"1px solid rgba(30,38,48,0.7)",animation:od&&!isDragOver?"rp 2s infinite":undefined,outline:isDragOver?"1px solid #c9a84c33":"none",opacity:dragSrc===i?0.4:1}}>
                    <td style={{...s.td,width:"20px",padding:"8px 4px"}}>
                      <span
                        style={s.dragHandle}
                        title="Drag to reorder"
                        onTouchStart={e=>{setDragSrc(i);e.currentTarget.closest('tr').setAttribute('data-touch-drag','1');}}
                        onTouchMove={e=>{
                          const touch=e.touches[0];
                          const el=document.elementFromPoint(touch.clientX,touch.clientY);
                          const tr=el&&el.closest('tr');
                          if(tr&&tr.dataset.idx){setDragOver(parseInt(tr.dataset.idx));}
                        }}
                        onTouchEnd={()=>{
                          if(dragSrc!==null&&dragOver!==null&&dragSrc!==dragOver){
                            const newRows=[...rowsRef.current];
                            const [moved]=newRows.splice(dragSrc,1);
                            newRows.splice(dragOver,0,moved);
                            setRows(newRows);
                            writeAllRows(newRows);
                          }
                          setDragSrc(null);setDragOver(null);
                        }}
                      >⠿</span>
                    </td>
                    <td style={{...s.td,color:"#5a6a7a",fontSize:"11px",width:"28px"}}>{String(i+1).padStart(2,"0")}</td>
                    <td style={{...s.td,minWidth:"130px"}}>
                      <input style={s.inp} value={r.name} placeholder="—" onChange={e=>updateRow(i,"name",e.target.value.toUpperCase())} maxLength={25}/>
                      {od&&<><span style={s.badge}>OVRD</span><span style={s.odTime}>{ovdStr(r)}</span></>}
                    </td>
                    <td style={{...s.td,minWidth:"110px"}}>
                      <select style={s.sel(r.location,locColorMap)} value={r.location} onChange={e=>updateRow(i,"location",e.target.value)}>
                        <option value="">—</option>
                        {locs.map(l=><option key={l} value={l}>{l}</option>)}
                      </select>
                    </td>
                    <td style={{...s.td,minWidth:"100px"}}>
                      <select style={s.sel(r.status,SCOL)} value={r.status} onChange={e=>updateRow(i,"status",e.target.value)}>
                        <option value="">—</option>
                        {STATUSES.map(st=><option key={st} value={st}>{st}</option>)}
                      </select>
                    </td>
                    <td style={s.td}>
                      <button style={s.tBtn(dis)} onClick={()=>!dis&&setPicker({idx:i,time:r.dueBack||"00:00",date:r.dueDate||""})}>
                        {dueLabel}
                      </button>
                    </td>
                    <td style={{...s.td,minWidth:"110px"}}>
                      <input style={s.notesInp} value={r.notes} placeholder="—" onChange={e=>updateRow(i,"notes",e.target.value)} maxLength={80}/>
                    </td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
          <div style={s.footer}><span style={{color:"#2ecc71"}}>⬤ LIVE</span><span>BAHRAIN TIME // 100 SLOTS</span></div>
        </>}

        {/* ── LOCATIONS TAB ── */}
        {tab==="locs"&&<>
          <div style={s.hint}>ADD OR REMOVE LOCATIONS — CHANGES SYNC INSTANTLY FOR EVERYONE</div>
          <div style={s.addRow}>
            <input style={s.addInp} value={newLoc} placeholder="TYPE NEW LOCATION..." onChange={e=>setNewLoc(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&addLoc()} maxLength={20}/>
            <button style={s.addBtn} onClick={addLoc}>+ ADD</button>
          </div>
          <div style={{fontSize:"10px",color:"#5a6a7a",letterSpacing:"1px"}}>Press ADD or hit Enter.</div>
          <div style={s.secTitle}>CURRENT LOCATIONS ({locs.length})</div>
          <div style={s.locGrid}>
            {locs.map((l,i)=>{const c=PAL[i%PAL.length];return(
              <div key={l} style={s.locChip(c)}>
                <div style={{width:7,height:7,borderRadius:"50%",background:c,flexShrink:0}}/>{l}
                <button style={s.rmBtn} onClick={()=>removeLoc(l)}>✕</button>
              </div>
            );})}
          </div>
          <div style={s.warnBox}>⚠ Removing a location clears it from any personnel currently assigned to it.</div>
        </>}

        {/* ── VEHICLES TAB ── */}
        {tab==="vehicles"&&<>
          <div style={s.hint}>VEHICLE REGISTER — 100 SLOTS // ALL CHANGES SYNC INSTANTLY</div>
          <div style={s.tw}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr>{["#","Make","Model","Colour","VRN","Name / User"].map(h=><th key={h} style={s.th}>{h}</th>)}</tr></thead>
              <tbody>
                {vehicles.map((v,i)=>(
                  <tr key={i} style={{borderBottom:"1px solid rgba(30,38,48,0.7)"}}>
                    <td style={{...s.td,color:"#5a6a7a",fontSize:"11px",width:"28px"}}>{String(i+1).padStart(2,"0")}</td>
                    {["make","model","colour","vrn"].map(field=>(
                      <td key={field} style={{...s.td,minWidth:"100px"}}>
                        <input
                          style={{...s.inp,textTransform:field==="vrn"?"uppercase":"none",letterSpacing:field==="vrn"?"2px":"normal"}}
                          value={v[field]||""}
                          placeholder="—"
                          maxLength={30}
                          onChange={e=>{
                            const val=field==="vrn"?e.target.value.toUpperCase():e.target.value;
                            e.target.value=val;
                            setVehicles(prev=>{const n=[...prev];n[i]={...n[i],[field]:val};return n;});
                            writeVehicle(i,field,val);
                          }}
                        />
                      </td>
                    ))}
                    <td style={{...s.td,minWidth:"130px"}}>
                      <select
                        value={v.name||""}
                        onChange={e=>{const val=e.target.value;setVehicles(prev=>{const n=[...prev];n[i]={...n[i],name:val};return n;});writeVehicle(i,"name",val);}}
                        style={{appearance:"none",WebkitAppearance:"none",background:"#080a0d",border:"1px solid #1e2630",color:v.name?"#fff":"#5a6a7a",fontFamily:f.mono,fontSize:"11px",padding:"4px 6px",cursor:"pointer",outline:"none",width:"100%",borderRadius:"0"}}
                      >
                        <option value="">— SELECT —</option>
                        {rows.filter(r=>r.name).map(r=><option key={r.name} value={r.name}>{r.name}</option>)}
                      </select>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>}

        {/* ── FUEL CARDS TAB ── */}
        {tab==="fuelcards"&&<>
          <div style={s.hint}>FUEL CARD REGISTER — 30 SLOTS // ALL CHANGES SYNC INSTANTLY</div>
          <div style={s.tw}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr>{["#","Fuel Card Number","Name / Holder","Notes"].map(h=><th key={h} style={s.th}>{h}</th>)}</tr></thead>
              <tbody>
                {fuelCards.map((fc,i)=>(
                  <tr key={i} style={{borderBottom:"1px solid rgba(30,38,48,0.7)"}}>
                    <td style={{...s.td,color:"#5a6a7a",fontSize:"11px",width:"28px"}}>{String(i+1).padStart(2,"0")}</td>
                    <td style={{...s.td,minWidth:"180px"}}>
                      <input
                        style={{...s.inp,letterSpacing:"2px"}}
                        value={fc.cardnum||""}
                        placeholder="CARD NUMBER"
                        maxLength={30}
                        onChange={e=>{
                          const val=e.target.value;
                          setFuelCards(prev=>{const n=[...prev];n[i]={...n[i],cardnum:val};return n;});
                          writeFuelCard(i,"cardnum",val);
                        }}
                      />
                    </td>
                    <td style={{...s.td,minWidth:"160px"}}>
                      <select
                        value={fc.name||""}
                        onChange={e=>{const val=e.target.value;setFuelCards(prev=>{const n=[...prev];n[i]={...n[i],name:val};return n;});writeFuelCard(i,"name",val);}}
                        style={{appearance:"none",WebkitAppearance:"none",background:"#080a0d",border:"1px solid #1e2630",color:fc.name?"#fff":"#5a6a7a",fontFamily:f.mono,fontSize:"11px",padding:"4px 6px",cursor:"pointer",outline:"none",width:"100%",borderRadius:"0"}}
                      >
                        <option value="">— SELECT —</option>
                        {rows.filter(r=>r.name).map(r=><option key={r.name} value={r.name}>{r.name}</option>)}
                      </select>
                    </td>
                    <td style={{...s.td,minWidth:"160px"}}>
                      <input
                        style={s.notesInp}
                        value={fc.notes||""}
                        placeholder="Notes..."
                        maxLength={80}
                        onChange={e=>{const val=e.target.value;setFuelCards(prev=>{const n=[...prev];n[i]={...n[i],notes:val};return n;});writeFuelCard(i,"notes",val);}}
                      />
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>}

        {/* ── WH SHIFTS TAB ── */}
        {tab==="wh"&&<WHTab
          whShifts={whShifts}
          setWhShifts={setWhShifts}
          writeWH={writeWH}
          weekStart={weekStart}
          setWeekStart={setWeekStart}
          boardNames={rows.filter(r=>r.name).map(r=>r.name)}
          vehicleList={vehicles.filter(v=>v.vrn).map(v=>({label:v.vrn+(v.make?" — "+v.make:"")+(v.model?" "+v.model:""),value:v.vrn+(v.make?" — "+v.make:"")+(v.model?" "+v.model:"")}))}
          s={s} f={f}
        />}

      </div>

      {picker&&<TimePicker
        time={picker.time}
        date={picker.date}
        onConfirm={(t,d)=>{updateRow(picker.idx,"dueBack",t);updateRow(picker.idx,"dueDate",d);setPicker(null);}}
        onClear={()=>{updateRow(picker.idx,"dueBack","");updateRow(picker.idx,"dueDate","");setPicker(null);}}
        onClose={()=>setPicker(null)}
      />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
