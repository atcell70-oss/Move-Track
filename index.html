<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moving & Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
// Firebase init OUTSIDE babel so both React and vanilla JS can use it
firebase.initializeApp({databaseURL:"https://move---track-default-rtdb.europe-west1.firebasedatabase.app"});
window.db = firebase.database();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{min-height:100vh}
body{background:#080a0d;color:#d4dde8}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(201,168,76,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
#root{position:relative;z-index:1}
select{-webkit-appearance:none;appearance:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes rp{0%,100%{background:rgba(231,76,60,0.07)}50%{background:rgba(231,76,60,0.13)}}
@keyframes alertpulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,0.2)}50%{box-shadow:0 0 8px 2px rgba(231,76,60,0.15)}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const db = window.db;
const DEFAULT_LOCS = ["WHITEHOUSE","BEB","BDL","OUT"];
const DEFAULT_STATUSES = ["IN","OUT","R&R","MEDICAL","TASKING","TRANSITING"];
const PAL = ["#c9a84c","#3498db","#2ecc71","#9b59b6","#e74c3c","#e67e22","#1abc9c","#e91e63","#00bcd4","#8bc34a"];
const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const SCOL = {
  IN:{color:"#2ecc71",bg:"rgba(46,204,113,0.15)"},
  OUT:{color:"#e74c3c",bg:"rgba(231,76,60,0.15)"},
  "R&R":{color:"#3498db",bg:"rgba(52,152,219,0.15)"},
  MEDICAL:{color:"#f39c12",bg:"rgba(243,156,18,0.15)"},
  TASKING:{color:"#9b59b6",bg:"rgba(155,89,182,0.15)"},
  TRANSITING:{color:"#1abc9c",bg:"rgba(26,188,156,0.15)"},
  "":{color:"#5a6a7a",bg:"transparent"},
};
const STATUS_PAL=["#2ecc71","#e74c3c","#3498db","#f39c12","#9b59b6","#1abc9c","#e67e22","#e91e63","#00bcd4","#c9a84c"];
function statusColor(st){const known=SCOL[st];if(known)return known;const i=DEFAULT_STATUSES.length;return{color:STATUS_PAL[i%STATUS_PAL.length],bg:"rgba(201,168,76,0.12)"};};
const APP_PIN = "0121";

const pad = n => String(n).padStart(2,"0");
const bhrNow = () => { const n=new Date(),h=(n.getUTCHours()+3)%24; return pad(h)+":"+pad(n.getUTCMinutes())+":"+pad(n.getUTCSeconds()); };
const zuluNow = () => { const n=new Date(); return pad(n.getUTCHours())+":"+pad(n.getUTCMinutes())+":"+pad(n.getUTCSeconds()); };
const nowMins = () => { const n=new Date(); return ((n.getUTCHours()+3)%24)*60+n.getUTCMinutes(); };
const toMins = t => { if(!t||!t.includes(":"))return null; const[h,m]=t.split(":").map(Number); return h*60+m; };
const isOvd = r => {
  if(!r||!r.dueBack||r.status==="IN"||!r.status)return false;
  if(r.dueDate){
    const now=new Date(new Date().getTime()+3*3600000);
    const[d,mo]=r.dueDate.split("/").map(Number);
    const due=new Date(Date.UTC(now.getUTCFullYear(),mo-1,d));
    const today=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate()));
    if(due>today)return false;
    if(due<today)return true;
  }
  const m=toMins(r.dueBack); return m!==null&&nowMins()>m;
};
const ovdStr = r => { const d=nowMins()-toMins(r.dueBack),h=Math.floor(d/60),m=d%60; return h>0?"+"+h+"H "+m+"M":"+"+m+"M"; };

const {useState,useEffect,useRef} = React;

// PIN PAD COMPONENT
function PinPad({onUnlock,title}){
  const [pin,setPin] = useState("");
  const [err,setErr] = useState(false);
  const fnt = "'Share Tech Mono',monospace";
  const tryUnlock = () => {
    if(pin===APP_PIN){onUnlock();}
    else{setErr(true);setPin("");}
  };
  const addDigit = d => { if(pin.length<4)setPin(p=>p+d); setErr(false); };
  const btnS = {background:"#0f1318",border:"1px solid #1e2630",color:"#d4dde8",fontFamily:fnt,fontSize:"20px",fontWeight:"bold",width:"70px",height:"60px",cursor:"pointer"};
  return (
    <div style={{background:"#0f1318",border:"1px solid #1e2630",padding:"20px",marginBottom:"20px",maxWidth:"280px"}}>
      <div style={{fontSize:"10px",color:"#c9a84c",letterSpacing:"3px",marginBottom:"16px",fontFamily:fnt}}>{title||"ENTER PIN TO EDIT"}</div>
      <div style={{display:"flex",gap:"10px",justifyContent:"center",marginBottom:"16px"}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:"40px",height:"40px",border:"1px solid "+(pin.length>i?"#c9a84c":"#1e2630"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",color:"#c9a84c",fontFamily:fnt}}>
            {pin.length>i?"●":""}
          </div>
        ))}
      </div>
      {err&&<div style={{color:"#e74c3c",fontSize:"10px",letterSpacing:"2px",textAlign:"center",marginBottom:"10px",fontFamily:fnt}}>INCORRECT PIN</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,70px)",gap:"8px",justifyContent:"center"}}>
        {[1,2,3,4,5,6,7,8,9].map(n=><button key={n} style={btnS} onClick={()=>addDigit(String(n))}>{n}</button>)}
        <button style={{...btnS,color:"#e74c3c",borderColor:"rgba(231,76,60,0.3)"}} onClick={()=>{setPin(p=>p.slice(0,-1));setErr(false);}}>⌫</button>
        <button style={btnS} onClick={()=>addDigit("0")}>0</button>
        <button style={{...btnS,background:"rgba(201,168,76,0.15)",borderColor:"#c9a84c",color:"#c9a84c",fontSize:"14px"}} onClick={tryUnlock}>OK</button>
      </div>
    </div>
  );
}

// TIME PICKER
function TimePicker({time,date,onConfirm,onClear,onClose}){
  const [h,setH] = useState(parseInt((time||"00:00").split(":")[0])||0);
  const [m,setM] = useState(parseInt((time||"00:00").split(":")[1])||0);
  const now = new Date(new Date().getTime()+3*3600000);
  const [day,setDay] = useState(date?parseInt(date.split("/")[0]):now.getUTCDate());
  const [mon,setMon] = useState(date?parseInt(date.split("/")[1])-1:now.getUTCMonth());
  const daysInMonth = new Date(Date.UTC(now.getUTCFullYear(),mon+1,0)).getUTCDate();
  const fnt = "'Share Tech Mono',monospace";
  const btnS = (sel) => ({background:sel?"rgba(201,168,76,0.2)":"#080a0d",border:"1px solid "+(sel?"#c9a84c":"#1e2630"),color:sel?"#c9a84c":"#5a6a7a",fontFamily:fnt,fontSize:"12px",padding:"6px 8px",cursor:"pointer",minWidth:"40px",letterSpacing:"1px"});
  const lbl = {fontSize:"9px",color:"#5a6a7a",letterSpacing:"3px",marginBottom:"8px",fontFamily:fnt};
  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px",overflowY:"auto"}}>
      <div style={{background:"#0f1318",border:"1px solid #c9a84c",width:"100%",maxWidth:"380px",fontFamily:fnt}}>
        <div style={{background:"#0d1117",borderBottom:"1px solid #7a6330",padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:"#c9a84c",fontSize:"11px",letterSpacing:"3px"}}>DUE BACK — DATE & TIME (BHR)</span>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:"#5a6a7a",cursor:"pointer",fontSize:"18px"}}>✕</button>
        </div>
        <div style={{padding:"16px 20px"}}>
          <div style={{textAlign:"center",fontSize:"32px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:"900",color:"#c9a84c",letterSpacing:"4px",marginBottom:"16px"}}>
            {pad(day)} {MONTHS[mon]} — {pad(h)}:{pad(m)}
          </div>
          <div style={{marginBottom:"12px"}}><div style={lbl}>MONTH</div><div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>{MONTHS.map((mo,i)=><button key={i} onClick={()=>{setMon(i);const dim=new Date(Date.UTC(now.getUTCFullYear(),i+1,0)).getUTCDate();if(day>dim)setDay(dim);}} style={btnS(mon===i)}>{mo}</button>)}</div></div>
          <div style={{marginBottom:"12px"}}><div style={lbl}>DAY</div><div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>{Array.from({length:daysInMonth},(_,i)=>i+1).map(d=><button key={d} onClick={()=>setDay(d)} style={btnS(day===d)}>{pad(d)}</button>)}</div></div>
          <div style={{marginBottom:"12px"}}><div style={lbl}>HOUR</div><div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>{Array.from({length:24},(_,i)=>i).map(hh=><button key={hh} onClick={()=>setH(hh)} style={btnS(h===hh)}>{pad(hh)}</button>)}</div></div>
          <div style={{marginBottom:"20px"}}><div style={lbl}>MINUTE</div><div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>{[0,5,10,15,20,25,30,35,40,45,50,55].map(mm=><button key={mm} onClick={()=>setM(mm)} style={btnS(m===mm)}>{pad(mm)}</button>)}</div></div>
          <div style={{display:"flex",gap:"8px"}}>
            <button onClick={onClear} style={{flex:1,background:"rgba(231,76,60,0.1)",border:"1px solid rgba(231,76,60,0.4)",color:"#e74c3c",fontFamily:fnt,fontSize:"12px",letterSpacing:"2px",padding:"10px",cursor:"pointer"}}>CLEAR</button>
            <button onClick={()=>onConfirm(pad(h)+":"+pad(m),pad(day)+"/"+pad(mon+1))} style={{flex:2,background:"rgba(201,168,76,0.15)",border:"1px solid #c9a84c",color:"#c9a84c",fontFamily:fnt,fontSize:"12px",letterSpacing:"2px",padding:"10px",cursor:"pointer"}}>CONFIRM</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// MAIN APP
function App(){
  const [rows,setRows] = useState(()=>Array.from({length:100},(_,i)=>({id:i+1,name:"",location:"",status:"",dueBack:"",dueDate:"",notes:""})));
  const [locs,setLocs] = useState(DEFAULT_LOCS);
  const [statuses,setStatuses] = useState(DEFAULT_STATUSES);
  const [newStatus,setNewStatus] = useState("");
  const [vehicles,setVehicles] = useState(()=>Array.from({length:100},(_,i)=>({id:i+1,make:"",model:"",colour:"",vrn:"",name:"",location:""})));
  const [fuelCards,setFuelCards] = useState(()=>Array.from({length:30},(_,i)=>({id:i+1,cardnum:"",name:"",notes:"",location:""})));
  const [tab,setTab] = useState("board");
  const [newLoc,setNewLoc] = useState("");
  const [bhr,setBhr] = useState(bhrNow());
  const [zulu,setZulu] = useState(zuluNow());
  const [connected,setConnected] = useState(false);
  const [picker,setPicker] = useState(null);

  const [locsUnlocked,setLocsUnlocked] = useState(false);
  const [dragSrc,setDragSrc] = useState(null);
  const [dragOver,setDragOver] = useState(null);
  const rowsRef = useRef(rows);
  rowsRef.current = rows;

  useEffect(()=>{
    const clk = setInterval(()=>{setBhr(bhrNow());setZulu(zuluNow());},1000);
    db.ref("board").on("value",snap=>{
      const data=snap.val()||{};
      setRows(Array.from({length:100},(_,i)=>({id:i+1,name:"",location:"",status:"",dueBack:"",dueDate:"",notes:"",...(data[i]||{})})));
      setConnected(true);
    });
    db.ref("locations").on("value",snap=>{ const v=snap.val(); if(Array.isArray(v)&&v.length>0)setLocs(v); });
    db.ref("statuses").on("value",snap=>{ const v=snap.val(); if(Array.isArray(v)&&v.length>0)setStatuses(v); });
    db.ref("vehicles").on("value",snap=>{
      const data=snap.val()||{};
      setVehicles(Array.from({length:100},(_,i)=>({id:i+1,make:"",model:"",colour:"",vrn:"",name:"",location:"",...(data[i]||{})})));
    });
    db.ref("fuelcards").on("value",snap=>{
      const data=snap.val()||{};
      setFuelCards(Array.from({length:30},(_,i)=>({id:i+1,cardnum:"",name:"",notes:"",location:"",...(data[i]||{})})));
    });
    return()=>{ clearInterval(clk); db.ref("board").off(); db.ref("locations").off(); db.ref("statuses").off(); db.ref("vehicles").off(); db.ref("fuelcards").off(); };
  },[]);

  const wf = (i,field,value) => { const u={}; u[field]=value; db.ref("board/"+i).update(u); };
  const writeLocs = l => db.ref("locations").set(l);
  const writeStatuses = s => db.ref("statuses").set(s);
  const writeVehicle = (i,f,v) => { const u={}; u[f]=v; db.ref("vehicles/"+i).update(u); };
  const writeFuelCard = (i,f,v) => { const u={}; u[f]=v; db.ref("fuelcards/"+i).update(u); };
  const writeAllRows = newRows => { const u={}; newRows.forEach((r,i)=>{u[i]={...r,id:i+1};}); db.ref("board").set(u); };

  const updateRow = (i,field,val) => {
    setRows(prev=>{ const n=[...prev]; n[i]={...n[i],[field]:val}; if(field==="status"&&val==="IN"){n[i].dueBack="";n[i].dueDate="";} return n; });
    wf(i,field,val);
    if(field==="status"&&val==="IN"){wf(i,"dueBack","");wf(i,"dueDate","");}
  };

  const addLoc = () => {
    if(!locsUnlocked)return;
    const v=newLoc.trim().toUpperCase();
    if(!v||locs.includes(v))return;
    const next=[...locs,v]; setLocs(next); writeLocs(next); setNewLoc("");
  };
  const addStatus = () => {
    if(!locsUnlocked)return;
    const v=newStatus.trim().toUpperCase();
    if(!v||statuses.includes(v))return;
    const next=[...statuses,v]; setStatuses(next); writeStatuses(next); setNewStatus("");
  };
  const removeStatus = st => {
    if(!locsUnlocked)return;
    const next=statuses.filter(s=>s!==st); setStatuses(next); writeStatuses(next);
  };
  const removeLoc = loc => {
    if(!locsUnlocked)return;
    const next=locs.filter(l=>l!==loc); setLocs(next); writeLocs(next);
    rowsRef.current.forEach((r,i)=>{ if(r.location===loc)wf(i,"location",""); });
  };

  const locColorMap = {};
  locs.forEach((l,i)=>{ const c=PAL[i%PAL.length]; locColorMap[l]={color:c,bg:c+"22"}; });
  locColorMap[""]={color:"#5a6a7a",bg:"transparent"};

  const sCounts={},lCounts={};let filled=0,odCount=0;
  rows.forEach(r=>{
    if(r.name)filled++;
    if(isOvd(r))odCount++;
    if(r.status)sCounts[r.status]=(sCounts[r.status]||0)+1;
    if(r.location)lCounts[r.location]=(lCounts[r.location]||0)+1;
  });
  const odRows = rows.filter(r=>r.name&&isOvd(r));

  const f = { mono:"'Share Tech Mono',monospace", sans:"'Barlow Condensed',sans-serif" };
  const s = {
    wrap:{background:"#080a0d",minHeight:"100vh",color:"#d4dde8",fontFamily:f.mono,fontSize:"13px"},
    header:{background:"#0d1117",borderBottom:"2px solid #c9a84c",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"12px"},
    title:{fontFamily:f.sans,fontWeight:"900",fontSize:"26px",letterSpacing:"5px",color:"#fff",textTransform:"uppercase"},
    gold:{color:"#c9a84c"},
    sub:{fontSize:"9px",color:"#5a6a7a",letterSpacing:"3px",marginTop:"3px",textTransform:"uppercase"},
    cw:{textAlign:"right"},
    bhrC:{fontFamily:f.sans,fontSize:"38px",fontWeight:"900",color:"#c9a84c",letterSpacing:"3px",lineHeight:"1"},
    bhrL:{fontSize:"9px",color:"#c9a84c",letterSpacing:"3px",marginTop:"2px"},
    zulC:{fontSize:"11px",color:"#5a6a7a",letterSpacing:"2px",marginTop:"4px"},
    fill:{color:"#c9a84c",fontSize:"11px",letterSpacing:"2px",marginTop:"4px"},
    tabs:{display:"flex",borderBottom:"1px solid #1e2630",background:"#0a0c0f",flexWrap:"wrap"},
    tab:a=>({background:a?"#0f1318":"transparent",border:"none",borderBottom:a?"2px solid #c9a84c":"2px solid transparent",color:a?"#c9a84c":"#5a6a7a",fontFamily:f.mono,fontSize:"11px",letterSpacing:"2px",padding:"11px 20px",cursor:"pointer",textTransform:"uppercase",marginBottom:"-1px"}),
    body:{padding:"14px 20px"},
    sr:{display:"flex",gap:"8px",marginBottom:"10px",flexWrap:"wrap"},
    sc:c=>({background:"#0f1318",border:"1px solid "+c+"33",padding:"7px 12px",display:"flex",alignItems:"center",gap:"7px"}),
    sn:c=>({fontSize:"20px",fontWeight:"bold",color:c,fontFamily:f.mono}),
    sl:{fontSize:"9px",color:"#5a6a7a",letterSpacing:"1px",textTransform:"uppercase"},
    alert:{background:"rgba(231,76,60,0.1)",border:"1px solid #e74c3c",borderLeft:"4px solid #e74c3c",padding:"10px 16px",marginBottom:"12px",animation:"alertpulse 1.5s infinite"},
    aTitle:{color:"#e74c3c",fontSize:"10px",letterSpacing:"3px",marginBottom:"8px"},
    aTag:{display:"inline-block",background:"rgba(231,76,60,0.2)",border:"1px solid rgba(231,76,60,0.5)",color:"#ff8a80",padding:"3px 8px",fontSize:"11px",marginRight:"6px",marginBottom:"4px"},
    tw:{background:"#0f1318",border:"1px solid #1e2630",overflowX:"auto"},
    th:{background:"#0d1117",borderBottom:"1px solid #7a6330",color:"#c9a84c",fontSize:"9px",letterSpacing:"3px",padding:"10px 12px",textAlign:"left",fontWeight:"normal",whiteSpace:"nowrap",textTransform:"uppercase"},
    td:{padding:"8px 12px",verticalAlign:"middle"},
    inp:{background:"transparent",border:"none",borderBottom:"1px solid #1e2630",color:"#fff",fontFamily:f.mono,fontSize:"12px",padding:"3px 4px",outline:"none",width:"100%",minWidth:"110px",textTransform:"uppercase"},
    sel:(val,map)=>({appearance:"none",WebkitAppearance:"none",background:map[val]?map[val].bg||"#0a0c0f":"#0a0c0f",border:"1px solid "+(map[val]?map[val].color||"#1e2630":"#1e2630")+"55",color:map[val]?map[val].color||"#5a6a7a":"#5a6a7a",fontFamily:f.mono,fontSize:"11px",padding:"4px 6px",cursor:"pointer",outline:"none",width:"100%",borderRadius:"0"}),
    tBtn:dis=>({background:dis?"transparent":"#080a0d",border:"1px solid "+(dis?"#1e2630":"#c9a84c55"),color:dis?"#2a3440":"#c9a84c",fontFamily:f.mono,fontSize:"11px",padding:"4px 7px",cursor:dis?"not-allowed":"pointer",letterSpacing:"1px",minWidth:"100px",textAlign:"center",lineHeight:"1.4"}),
    ni2:{background:"transparent",border:"none",borderBottom:"1px solid transparent",color:"#5a6a7a",fontFamily:f.mono,fontSize:"11px",padding:"3px 4px",outline:"none",width:"100%",minWidth:"100px"},
    badge:{background:"#e74c3c",color:"#fff",fontSize:"8px",padding:"1px 5px",marginLeft:"4px",letterSpacing:"1px",verticalAlign:"middle"},
    odT:{color:"#e74c3c",fontSize:"10px",marginLeft:"4px"},
    footer:{marginTop:"16px",paddingTop:"10px",borderTop:"1px solid #1e2630",fontSize:"10px",color:"#5a6a7a",letterSpacing:"1px",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"4px"},
    addRow:{display:"flex",gap:"8px",marginBottom:"6px"},
    addInp:{flex:"1",background:"#0f1318",border:"1px solid #1e2630",color:"#fff",fontFamily:f.mono,fontSize:"13px",padding:"9px 12px",outline:"none",textTransform:"uppercase"},
    addBtn:{background:"rgba(201,168,76,0.1)",border:"1px solid #c9a84c",color:"#c9a84c",fontFamily:f.mono,fontSize:"12px",letterSpacing:"2px",padding:"9px 16px",cursor:"pointer"},
    locGrid:{display:"flex",flexWrap:"wrap",gap:"8px",marginTop:"16px"},
    locChip:c=>({background:c+"14",border:"1px solid "+c+"44",color:c,fontFamily:f.mono,fontSize:"12px",letterSpacing:"1px",padding:"7px 12px",display:"flex",alignItems:"center",gap:"8px"}),
    rmBtn:{background:"transparent",border:"none",color:"#e74c3c",cursor:"pointer",fontSize:"14px",padding:"0",lineHeight:"1"},
    hint:{marginBottom:"16px",fontSize:"11px",color:"#5a6a7a",letterSpacing:"1px"},
    secT:{margin:"18px 0 10px",fontSize:"10px",color:"#c9a84c",letterSpacing:"3px"},
    warn:{marginTop:"16px",background:"rgba(231,76,60,0.06)",border:"1px solid rgba(231,76,60,0.2)",padding:"10px 14px",fontSize:"11px",color:"#8a9aaa"},
    dh:{color:"#2a3440",cursor:"grab",fontSize:"16px",padding:"0 4px",userSelect:"none",WebkitUserSelect:"none"},
    conn:{textAlign:"center",padding:"60px 20px",color:"#5a6a7a",fontSize:"12px",letterSpacing:"3px"},
  };

  const SDEFS=[{key:"IN",label:"In Loc",color:"#2ecc71"},{key:"OUT",label:"Out",color:"#e74c3c"},{key:"R&R",label:"R&R",color:"#3498db"},{key:"MEDICAL",label:"Medical",color:"#f39c12"},{key:"TASKING",label:"Tasking",color:"#9b59b6"},{key:"TOTAL",label:"Total",color:"#c9a84c"},{key:"OVERDUE",label:"Overdue",color:"#e74c3c"}];



  if(!connected) return (
    <div style={s.wrap}>
      <div style={s.header}>
        <div><div style={s.title}>MOVING <span style={s.gold}>&</span> TRACKING</div><div style={s.sub}>BDL Status Board // Live Personnel Tracking</div></div>
        <div style={s.cw}><div style={s.bhrC}>{bhr}</div><div style={s.bhrL}>BAHRAIN LOCAL</div><div style={s.zulC}>ZULU: {zulu}</div></div>
      </div>
      <div style={s.conn}><div style={{width:"30px",height:"30px",border:"2px solid #1e2630",borderTopColor:"#c9a84c",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 16px"}}/>CONNECTING TO DATABASE...</div>
    </div>
  );

  return (
    <div style={s.wrap}>
      <div style={s.header}>
        <div><div style={s.title}>MOVING <span style={s.gold}>&</span> TRACKING</div><div style={s.sub}>BDL Status Board // Live Personnel Tracking</div></div>
        <div style={s.cw}>
          <div style={s.bhrC}>{bhr}</div><div style={s.bhrL}>BAHRAIN LOCAL</div><div style={s.zulC}>ZULU: {zulu}</div>
          <div style={s.fill}>{filled}/100 FILLED{odCount>0&&<span style={{color:"#e74c3c",marginLeft:"8px"}}>⚠ {odCount} OVERDUE</span>}</div>
        </div>
      </div>

      <div style={s.tabs}>
        <button style={s.tab(tab==="board")} onClick={()=>setTab("board")}>Board</button>
        <button style={s.tab(tab==="locs")} onClick={()=>setTab("locs")}>Locations & Status</button>
        <button style={s.tab(tab==="vehicles")} onClick={()=>setTab("vehicles")}>Vehicles</button>
        <button style={s.tab(tab==="fuelcards")} onClick={()=>setTab("fuelcards")}>Fuel Cards</button>
        <a href="wh.html" style={{...s.tab(false),textDecoration:"none",display:"inline-block"}}>WH Shifts</a>
      </div>

      <div style={s.body}>

        {tab==="board"&&<>
          <div style={s.sr}>{SDEFS.map(({key,label,color})=>{const n=key==="TOTAL"?filled:key==="OVERDUE"?odCount:(sCounts[key]||0);return <div key={key} style={s.sc(color)}><div style={{width:7,height:7,borderRadius:"50%",background:n>0?color:"#2a3440",flexShrink:0,boxShadow:key==="OVERDUE"&&n>0?"0 0 6px "+color:undefined}}/><div><div style={s.sn(n>0?color:"#fff")}>{n}</div><div style={s.sl}>{label}</div></div></div>;})} </div>
          <div style={{...s.sr,marginBottom:"14px"}}>{locs.map((l,i)=>{const c=PAL[i%PAL.length],n=lCounts[l]||0;return <div key={l} style={s.sc(c)}><div style={{width:7,height:7,borderRadius:"50%",background:n>0?c:"#2a3440",flexShrink:0}}/><div><div style={s.sn(n>0?c:"#fff")}>{n}</div><div style={s.sl}>{l}</div></div></div>;})} </div>
          {odRows.length>0&&<div style={s.alert}><div style={s.aTitle}>⚠ OVERDUE PERSONNEL DETECTED</div><div>{odRows.map((r,i)=><span key={i} style={s.aTag}>{r.name} — {ovdStr(r)}</span>)}</div></div>}
          <div style={s.tw}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr><th style={s.th}></th>{["#","Name","Location","Status","Due Back (BHR)","Notes"].map(h=><th key={h} style={s.th}>{h}</th>)}</tr></thead>
              <tbody>
                {rows.map((r,i)=>{
                  const od=isOvd(r),dis=r.status==="IN"||r.status==="";
                  const dl=r.dueBack?(r.dueDate?r.dueDate+" "+r.dueBack:r.dueBack):"— : —";
                  const isDO=dragOver===i;
                  return <tr key={i} data-idx={i} draggable
                    onDragStart={()=>setDragSrc(i)} onDragOver={e=>{e.preventDefault();setDragOver(i);}} onDragLeave={()=>setDragOver(null)}
                    onDrop={e=>{e.preventDefault();if(dragSrc===null||dragSrc===i){setDragSrc(null);setDragOver(null);return;}const nr=[...rowsRef.current];const[mv]=nr.splice(dragSrc,1);nr.splice(i,0,mv);setRows(nr);writeAllRows(nr);setDragSrc(null);setDragOver(null);}}
                    style={{background:isDO?"rgba(201,168,76,0.06)":od?"rgba(231,76,60,0.07)":"transparent",borderBottom:isDO?"1px solid #c9a84c44":"1px solid rgba(30,38,48,0.7)",opacity:dragSrc===i?0.4:1}}>
                    <td style={{...s.td,width:"20px",padding:"8px 4px"}}><span style={s.dh} onTouchStart={()=>setDragSrc(i)} onTouchEnd={()=>{if(dragSrc!==null&&dragOver!==null&&dragSrc!==dragOver){const nr=[...rowsRef.current];const[mv]=nr.splice(dragSrc,1);nr.splice(dragOver,0,mv);setRows(nr);writeAllRows(nr);}setDragSrc(null);setDragOver(null);}}>⠿</span></td>
                    <td style={{...s.td,color:"#5a6a7a",fontSize:"11px",width:"28px"}}>{String(i+1).padStart(2,"0")}</td>
                    <td style={{...s.td,minWidth:"130px"}}><input style={s.inp} value={r.name} placeholder="—" onChange={e=>updateRow(i,"name",e.target.value.toUpperCase())} maxLength={25}/>{od&&<><span style={s.badge}>OVRD</span><span style={s.odT}>{ovdStr(r)}</span></>}</td>
                    <td style={{...s.td,minWidth:"110px"}}><select style={s.sel(r.location,locColorMap)} value={r.location} onChange={e=>updateRow(i,"location",e.target.value)}><option value="">—</option>{locs.map(l=><option key={l} value={l}>{l}</option>)}</select></td>
                    <td style={{...s.td,minWidth:"100px"}}><select style={s.sel(r.status,Object.fromEntries(statuses.map(st=>[st,statusColor(st)]).concat([["",{color:"#5a6a7a",bg:"transparent"}]])))} value={r.status} onChange={e=>updateRow(i,"status",e.target.value)}><option value="">—</option>{statuses.map(st=><option key={st} value={st}>{st}</option>)}</select></td>
                    <td style={s.td}><button style={s.tBtn(dis)} onClick={()=>!dis&&setPicker({idx:i,time:r.dueBack||"00:00",date:r.dueDate||""})}>{dl}</button></td>
                    <td style={{...s.td,minWidth:"110px"}}><input style={s.ni2} value={r.notes} placeholder="—" onChange={e=>updateRow(i,"notes",e.target.value)} maxLength={80}/></td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
          <div style={s.footer}><span style={{color:"#2ecc71"}}>⬤ LIVE</span><span>BAHRAIN TIME // 100 SLOTS</span></div>
        </>}

        {tab==="locs"&&<>
          {/* Lock/Unlock header */}
          <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"16px",flexWrap:"wrap"}}>
            <span style={{fontSize:"11px",color:"#5a6a7a",letterSpacing:"1px"}}>{locsUnlocked?"🔓 UNLOCKED — EDIT MODE":"🔒 READ ONLY — PIN REQUIRED TO EDIT"}</span>
            {locsUnlocked&&<button onClick={()=>setLocsUnlocked(false)} style={{background:"rgba(231,76,60,0.1)",border:"1px solid rgba(231,76,60,0.3)",color:"#e74c3c",fontFamily:f.mono,fontSize:"10px",letterSpacing:"2px",padding:"5px 10px",cursor:"pointer"}}>LOCK</button>}
          </div>
          {!locsUnlocked&&<PinPad onUnlock={()=>setLocsUnlocked(true)} title="ENTER PIN TO EDIT LOCATIONS & STATUS"/>}

          {/* LOCATIONS SECTION */}
          <div style={{...s.secT,marginTop:"0"}}>LOCATIONS</div>
          {locsUnlocked&&<>
            <div style={s.addRow}>
              <input style={s.addInp} value={newLoc} placeholder="TYPE NEW LOCATION..." onChange={e=>setNewLoc(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&addLoc()} maxLength={20}/>
              <button style={s.addBtn} onClick={addLoc}>+ ADD</button>
            </div>
            <div style={{fontSize:"10px",color:"#5a6a7a",letterSpacing:"1px",marginBottom:"10px"}}>Press ADD or hit Enter.</div>
          </>}
          <div style={s.locGrid}>{locs.map((l,i)=>{const c=PAL[i%PAL.length];return(<div key={l} style={s.locChip(c)}><div style={{width:7,height:7,borderRadius:"50%",background:c,flexShrink:0}}/>{l}{locsUnlocked&&<button style={s.rmBtn} onClick={()=>removeLoc(l)}>✕</button>}</div>);})}</div>
          <div style={s.warn}>⚠ Removing a location clears it from any personnel currently assigned to it.</div>

          {/* STATUS SECTION */}
          <div style={{...s.secT,marginTop:"20px"}}>STATUSES</div>
          {locsUnlocked&&<>
            <div style={s.addRow}>
              <input style={s.addInp} value={newStatus} placeholder="TYPE NEW STATUS..." onChange={e=>setNewStatus(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&addStatus()} maxLength={20}/>
              <button style={s.addBtn} onClick={addStatus}>+ ADD</button>
            </div>
            <div style={{fontSize:"10px",color:"#5a6a7a",letterSpacing:"1px",marginBottom:"10px"}}>Press ADD or hit Enter.</div>
          </>}
          <div style={s.locGrid}>{statuses.map((st,i)=>{const c=statusColor(st).color;return(<div key={st} style={s.locChip(c)}><div style={{width:7,height:7,borderRadius:"50%",background:c,flexShrink:0}}/>{st}{locsUnlocked&&<button style={s.rmBtn} onClick={()=>removeStatus(st)}>✕</button>}</div>);})}</div>
          <div style={{...s.warn,marginTop:"8px"}}>⚠ Removing a status clears it from any personnel currently assigned to it.</div>
        </>}

        {tab==="vehicles"&&<>
          <div style={s.hint}>VEHICLE REGISTER — 100 SLOTS</div>
          <div style={s.tw}><table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["#","Make","Model","Colour","VRN","Name / User","Location"].map(h=><th key={h} style={s.th}>{h}</th>)}</tr></thead>
            <tbody>{vehicles.map((v,i)=>(
              <tr key={i} style={{borderBottom:"1px solid rgba(30,38,48,0.7)"}}>
                <td style={{...s.td,color:"#5a6a7a",fontSize:"11px",width:"28px"}}>{String(i+1).padStart(2,"0")}</td>
                {["make","model","colour","vrn"].map(field=>(
                  <td key={field} style={{...s.td,minWidth:"100px"}}>
                    <input style={{...s.inp,textTransform:field==="vrn"?"uppercase":"none",letterSpacing:field==="vrn"?"2px":"normal"}} value={v[field]||""} placeholder="—" maxLength={30}
                      onChange={e=>{const val=field==="vrn"?e.target.value.toUpperCase():e.target.value;e.target.value=val;setVehicles(prev=>{const n=[...prev];n[i]={...n[i],[field]:val};return n;});writeVehicle(i,field,val);}}/>
                  </td>
                ))}
                <td style={{...s.td,minWidth:"130px"}}>
                  <select value={v.name||""} onChange={e=>{const val=e.target.value;setVehicles(prev=>{const n=[...prev];n[i]={...n[i],name:val};return n;});writeVehicle(i,"name",val);}} style={{appearance:"none",WebkitAppearance:"none",background:"#080a0d",border:"1px solid #1e2630",color:v.name?"#fff":"#5a6a7a",fontFamily:f.mono,fontSize:"11px",padding:"4px 6px",cursor:"pointer",outline:"none",width:"100%",borderRadius:"0"}}>
                    <option value="">— SELECT —</option>
                    {rows.filter(r=>r.name).map(r=><option key={r.name} value={r.name}>{r.name}</option>)}
                  </select>
                </td>
                <td style={{...s.td,minWidth:"120px"}}>
                  <select value={v.location||""} onChange={e=>{const val=e.target.value;setVehicles(prev=>{const n=[...prev];n[i]={...n[i],location:val};return n;});writeVehicle(i,"location",val);}} style={{appearance:"none",WebkitAppearance:"none",background:v.location?locColorMap[v.location]?locColorMap[v.location].bg:"#080a0d":"#080a0d",border:"1px solid "+(v.location?locColorMap[v.location]?locColorMap[v.location].color+"55":"#1e2630":"#1e2630"),color:v.location?locColorMap[v.location]?locColorMap[v.location].color:"#fff":"#5a6a7a",fontFamily:f.mono,fontSize:"11px",padding:"4px 6px",cursor:"pointer",outline:"none",width:"100%",borderRadius:"0"}}>
                    <option value="">— SELECT —</option>
                    {locs.map(l=><option key={l} value={l}>{l}</option>)}
                  </select>
                </td>
              </tr>
            ))}</tbody>
          </table></div>
        </>}

        {tab==="fuelcards"&&<>
          <div style={s.hint}>FUEL CARD REGISTER — 30 SLOTS</div>
          <div style={s.tw}><table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["#","Fuel Card Number","Name / Holder","Notes","Location"].map(h=><th key={h} style={s.th}>{h}</th>)}</tr></thead>
            <tbody>{fuelCards.map((fc,i)=>(
              <tr key={i} style={{borderBottom:"1px solid rgba(30,38,48,0.7)"}}>
                <td style={{...s.td,color:"#5a6a7a",fontSize:"11px",width:"28px"}}>{String(i+1).padStart(2,"0")}</td>
                <td style={{...s.td,minWidth:"160px"}}><input style={{...s.inp,letterSpacing:"2px"}} value={fc.cardnum||""} placeholder="CARD NUMBER" maxLength={30} onChange={e=>{const val=e.target.value;setFuelCards(prev=>{const n=[...prev];n[i]={...n[i],cardnum:val};return n;});writeFuelCard(i,"cardnum",val);}}/></td>
                <td style={{...s.td,minWidth:"150px"}}>
                  <select value={fc.name||""} onChange={e=>{const val=e.target.value;setFuelCards(prev=>{const n=[...prev];n[i]={...n[i],name:val};return n;});writeFuelCard(i,"name",val);}} style={{appearance:"none",WebkitAppearance:"none",background:"#080a0d",border:"1px solid #1e2630",color:fc.name?"#fff":"#5a6a7a",fontFamily:f.mono,fontSize:"11px",padding:"4px 6px",cursor:"pointer",outline:"none",width:"100%",borderRadius:"0"}}>
                    <option value="">— SELECT —</option>
                    {rows.filter(r=>r.name).map(r=><option key={r.name} value={r.name}>{r.name}</option>)}
                  </select>
                </td>
                <td style={{...s.td,minWidth:"160px"}}><input style={s.ni2} value={fc.notes||""} placeholder="Notes..." maxLength={80} onChange={e=>{const val=e.target.value;setFuelCards(prev=>{const n=[...prev];n[i]={...n[i],notes:val};return n;});writeFuelCard(i,"notes",val);}}/></td>
                <td style={{...s.td,minWidth:"120px"}}>
                  <select value={fc.location||""} onChange={e=>{const val=e.target.value;setFuelCards(prev=>{const n=[...prev];n[i]={...n[i],location:val};return n;});writeFuelCard(i,"location",val);}} style={{appearance:"none",WebkitAppearance:"none",background:fc.location?locColorMap[fc.location]?locColorMap[fc.location].bg:"#080a0d":"#080a0d",border:"1px solid "+(fc.location?locColorMap[fc.location]?locColorMap[fc.location].color+"55":"#1e2630":"#1e2630"),color:fc.location?locColorMap[fc.location]?locColorMap[fc.location].color:"#fff":"#5a6a7a",fontFamily:f.mono,fontSize:"11px",padding:"4px 6px",cursor:"pointer",outline:"none",width:"100%",borderRadius:"0"}}>
                    <option value="">— SELECT —</option>
                    {locs.map(l=><option key={l} value={l}>{l}</option>)}
                  </select>
                </td>
              </tr>
            ))}</tbody>
          </table></div>
        </>}

      </div>

      {picker&&<TimePicker time={picker.time} date={picker.date} onConfirm={(t,d)=>{updateRow(picker.idx,"dueBack",t);updateRow(picker.idx,"dueDate",d);setPicker(null);}} onClear={()=>{updateRow(picker.idx,"dueBack","");updateRow(picker.idx,"dueDate","");setPicker(null);}} onClose={()=>setPicker(null)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>


</body>
</html>
