<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moving & Tracking — BDL Status Board</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{--bg:#080a0d;--panel:#0f1318;--border:#1e2630;--gold:#c9a84c;--gold-dim:#7a6330;--green:#2ecc71;--red:#e74c3c;--amber:#f39c12;--blue:#3498db;--purple:#9b59b6;--text:#d4dde8;--dim:#5a6a7a}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{min-height:100vh}
  body{background:var(--bg);color:var(--text)}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(201,168,76,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  #root{position:relative;z-index:1}
  input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.4)}
  select{-webkit-appearance:none;appearance:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
firebase.initializeApp({databaseURL:"https://move---track-default-rtdb.europe-west1.firebasedatabase.app"});
const db = firebase.database();

const DEFAULT_LOCATIONS = ["WHITEHOUSE","BEB","BDL","OUT"];
const STATUSES = ["IN","OUT","R&R","MEDICAL","TASKING"];
const LOC_PALETTE = ["#c9a84c","#3498db","#2ecc71","#9b59b6","#e74c3c","#e67e22","#1abc9c","#e91e63","#00bcd4","#8bc34a"];
const STATUS_COLOR = {
  IN:{color:"#2ecc71",bg:"rgba(46,204,113,0.15)"},
  OUT:{color:"#e74c3c",bg:"rgba(231,76,60,0.15)"},
  "R&R":{color:"#3498db",bg:"rgba(52,152,219,0.15)"},
  MEDICAL:{color:"#f39c12",bg:"rgba(243,156,18,0.15)"},
  TASKING:{color:"#9b59b6",bg:"rgba(155,89,182,0.15)"},
  "":{color:"#5a6a7a",bg:"transparent"},
};

const defaultRows = () => Array.from({length:100},(_,i)=>({id:i+1,name:"",location:"",status:"",dueBack:"",notes:""}));

function bhrNow(){const n=new Date(),z=v=>String(v).padStart(2,"0"),h=(n.getUTCHours()+3)%24;return`${z(h)}:${z(n.getUTCMinutes())}:${z(n.getUTCSeconds())}`;}
function zuluNow(){const n=new Date(),z=v=>String(v).padStart(2,"0");return`${z(n.getUTCHours())}:${z(n.getUTCMinutes())}:${z(n.getUTCSeconds())}`;}
function nowMins(){const n=new Date();return((n.getUTCHours()+3)%24)*60+n.getUTCMinutes();}
function timeMins(t){if(!t)return null;const[h,m]=t.split(":").map(Number);return h*60+m;}
function isOverdue(r){if(!r||!r.dueBack||r.status==="IN"||!r.status)return false;return nowMins()>timeMins(r.dueBack);}
function overdueStr(r){const diff=nowMins()-timeMins(r.dueBack),h=Math.floor(diff/60),m=diff%60;return h>0?`+${h}H ${m}M`:`+${m}M`;}

const {useState,useEffect,useRef} = React;

function App(){
  const [rows,setRows]=useState(defaultRows);
  const [locations,setLocations]=useState(DEFAULT_LOCATIONS);
  const [tab,setTab]=useState("board");
  const [newLoc,setNewLoc]=useState("");
  const [bhr,setBhr]=useState(bhrNow());
  const [zulu,setZulu]=useState(zuluNow());
  const [connected,setConnected]=useState(false);
  const rowsRef=useRef(rows);
  rowsRef.current=rows;

  useEffect(()=>{
    // Clock
    const clk=setInterval(()=>{setBhr(bhrNow());setZulu(zuluNow());},1000);
    // Firebase board
    const boardRef=db.ref("board");
    boardRef.on("value",snap=>{
      const data=snap.val()||{};
      setRows(Array.from({length:100},(_,i)=>({id:i+1,name:"",location:"",status:"",dueBack:"",notes:"",...(data[i]||{})})));
      setConnected(true);
    });
    // Firebase locations
    const locRef=db.ref("locations");
    locRef.on("value",snap=>{const v=snap.val();if(Array.isArray(v)&&v.length>0)setLocations(v);});
    return()=>{clearInterval(clk);boardRef.off();locRef.off();};
  },[]);

  const writeField=(i,field,value)=>{const u={};u[field]=value;db.ref("board/"+i).update(u);};
  const writeLocations=(locs)=>{db.ref("locations").set(locs);};

  const updateRow=(i,field,val)=>{
    const next=[...rowsRef.current];
    next[i]={...next[i],[field]:val};
    if(field==="status"&&val==="IN")next[i].dueBack="";
    setRows(next);
    writeField(i,field,val);
    if(field==="status"&&val==="IN")writeField(i,"dueBack","");
  };

  const addLocation=()=>{
    const v=newLoc.trim().toUpperCase();
    if(!v||locations.includes(v))return;
    const next=[...locations,v];
    setLocations(next);writeLocations(next);setNewLoc("");
  };
  const removeLocation=(loc)=>{
    const next=locations.filter(l=>l!==loc);
    setLocations(next);writeLocations(next);
    rows.forEach((r,i)=>{if(r.location===loc)writeField(i,"location","");});
  };

  const locColorMap={};
  locations.forEach((l,i)=>{const c=LOC_PALETTE[i%LOC_PALETTE.length];locColorMap[l]={color:c,bg:c+"22"};});
  locColorMap[""]={color:"#5a6a7a",bg:"transparent"};

  const statusCounts={};const locCounts={};let filled=0,overdueCount=0;
  rows.forEach(r=>{
    if(r.name)filled++;
    if(isOverdue(r))overdueCount++;
    if(r.status)statusCounts[r.status]=(statusCounts[r.status]||0)+1;
    if(r.location)locCounts[r.location]=(locCounts[r.location]||0)+1;
  });
  const overdueRows=rows.filter(r=>r.name&&isOverdue(r));

  const s={
    wrap:{background:"#080a0d",minHeight:"100vh",color:"#d4dde8",fontFamily:"'Share Tech Mono',monospace",fontSize:"13px"},
    header:{background:"#0d1117",borderBottom:"2px solid #c9a84c",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"12px"},
    title:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:"900",fontSize:"26px",letterSpacing:"5px",color:"#fff",textTransform:"uppercase"},
    gold:{color:"#c9a84c"},
    sub:{fontSize:"9px",color:"#5a6a7a",letterSpacing:"3px",marginTop:"3px",textTransform:"uppercase"},
    clockWrap:{textAlign:"right"},
    bhrClock:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:"36px",fontWeight:"900",letterSpacing:"3px",color:"#c9a84c",lineHeight:"1"},
    bhrLabel:{fontSize:"9px",color:"#c9a84c",letterSpacing:"3px",marginTop:"2px"},
    zuluClock:{fontSize:"11px",color:"#5a6a7a",letterSpacing:"2px",marginTop:"4px"},
    slotCount:{color:"#c9a84c",fontSize:"11px",letterSpacing:"2px",marginTop:"4px"},
    tabs:{display:"flex",borderBottom:"1px solid #1e2630",background:"#0a0c0f"},
    tab:(a)=>({background:a?"#0f1318":"transparent",border:"none",borderBottom:a?"2px solid #c9a84c":"2px solid transparent",color:a?"#c9a84c":"#5a6a7a",fontFamily:"'Share Tech Mono',monospace",fontSize:"11px",letterSpacing:"2px",padding:"11px 20px",cursor:"pointer",textTransform:"uppercase",marginBottom:"-1px"}),
    body:{padding:"14px 20px"},
    statsRow:{display:"flex",gap:"8px",marginBottom:"10px",flexWrap:"wrap"},
    statCard:(c)=>({background:"#0f1318",border:`1px solid ${c}33`,padding:"7px 12px",display:"flex",alignItems:"center",gap:"7px"}),
    statNum:(c)=>({fontSize:"20px",fontWeight:"bold",color:c}),
    statLbl:{fontSize:"9px",color:"#5a6a7a",letterSpacing:"1px",textTransform:"uppercase"},
    alert:{background:"rgba(231,76,60,0.1)",border:"1px solid #e74c3c",borderLeft:"4px solid #e74c3c",padding:"10px 16px",marginBottom:"12px"},
    alertTitle:{color:"#e74c3c",fontSize:"10px",letterSpacing:"3px",marginBottom:"8px"},
    alertTag:{display:"inline-block",background:"rgba(231,76,60,0.2)",border:"1px solid rgba(231,76,60,0.5)",color:"#ff8a80",padding:"3px 8px",fontSize:"11px",marginRight:"6px",marginBottom:"4px"},
    tableWrap:{background:"#0f1318",border:"1px solid #1e2630",overflowX:"auto"},
    th:{background:"#0d1117",borderBottom:"1px solid #7a6330",color:"#c9a84c",fontSize:"9px",letterSpacing:"3px",padding:"10px 12px",textAlign:"left",fontWeight:"normal",whiteSpace:"nowrap",textTransform:"uppercase"},
    td:{padding:"8px 12px",verticalAlign:"middle"},
    inp:{background:"transparent",border:"none",borderBottom:"1px solid #1e2630",color:"#fff",fontFamily:"'Share Tech Mono',monospace",fontSize:"12px",padding:"3px 4px",outline:"none",width:"100%",minWidth:"110px",textTransform:"uppercase"},
    sel:(val,map)=>({appearance:"none",WebkitAppearance:"none",background:map[val]?.bg||"#0a0c0f",border:`1px solid ${map[val]?.color||"#1e2630"}55`,color:map[val]?.color||"#5a6a7a",fontFamily:"'Share Tech Mono',monospace",fontSize:"11px",padding:"4px 6px",cursor:"pointer",outline:"none",width:"100%",borderRadius:"0"}),
    timeInp:(dis)=>({background:"#080a0d",border:"1px solid #1e2630",color:dis?"#2a3440":"#d4dde8",fontFamily:"'Share Tech Mono',monospace",fontSize:"11px",padding:"4px 6px",outline:"none",width:"82px",cursor:dis?"not-allowed":"auto"}),
    notesInp:{background:"transparent",border:"none",borderBottom:"1px solid transparent",color:"#5a6a7a",fontFamily:"'Share Tech Mono',monospace",fontSize:"11px",padding:"3px 4px",outline:"none",width:"100%",minWidth:"100px"},
    overdueBadge:{background:"#e74c3c",color:"#fff",fontSize:"8px",padding:"1px 5px",marginLeft:"4px",letterSpacing:"1px",verticalAlign:"middle"},
    overdueTime:{color:"#e74c3c",fontSize:"10px",marginLeft:"4px"},
    addRow:{display:"flex",gap:"8px",marginBottom:"6px"},
    addInp:{flex:"1",background:"#0f1318",border:"1px solid #1e2630",color:"#fff",fontFamily:"'Share Tech Mono',monospace",fontSize:"13px",padding:"9px 12px",outline:"none",letterSpacing:"1px",textTransform:"uppercase"},
    addBtn:{background:"rgba(201,168,76,0.1)",border:"1px solid #c9a84c",color:"#c9a84c",fontFamily:"'Share Tech Mono',monospace",fontSize:"12px",letterSpacing:"2px",padding:"9px 16px",cursor:"pointer"},
    locGrid:{display:"flex",flexWrap:"wrap",gap:"8px",marginTop:"16px"},
    locChip:(c)=>({background:c+"14",border:`1px solid ${c}44`,color:c,fontFamily:"'Share Tech Mono',monospace",fontSize:"12px",letterSpacing:"1px",padding:"7px 12px",display:"flex",alignItems:"center",gap:"8px"}),
    removeBtn:{background:"transparent",border:"none",color:"#e74c3c",cursor:"pointer",fontSize:"14px",padding:"0",lineHeight:"1"},
    footer:{marginTop:"16px",paddingTop:"10px",borderTop:"1px solid #1e2630",fontSize:"10px",color:"#5a6a7a",letterSpacing:"1px",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"4px"},
    connecting:{textAlign:"center",padding:"60px 20px",color:"#5a6a7a",fontSize:"12px",letterSpacing:"3px"},
  };

  const STAT_DEFS=[
    {key:"IN",label:"In Loc",color:"#2ecc71"},
    {key:"OUT",label:"Out",color:"#e74c3c"},
    {key:"R&R",label:"R&R",color:"#3498db"},
    {key:"MEDICAL",label:"Medical",color:"#f39c12"},
    {key:"TASKING",label:"Tasking",color:"#9b59b6"},
    {key:"TOTAL",label:"Total",color:"#c9a84c"},
    {key:"OVERDUE",label:"Overdue",color:"#e74c3c"},
  ];

  if(!connected) return (
    <div style={s.wrap}>
      <div style={s.header}>
        <div><div style={s.title}>MOVING <span style={s.gold}>&</span> TRACKING</div><div style={s.sub}>BDL Status Board // Live Personnel Tracking</div></div>
        <div style={s.clockWrap}><div style={s.bhrClock}>{bhr}</div><div style={s.bhrLabel}>BAHRAIN LOCAL</div><div style={s.zuluClock}>ZULU: {zulu}</div></div>
      </div>
      <div style={s.connecting}>
        <div style={{width:"30px",height:"30px",border:"2px solid #1e2630",borderTopColor:"#c9a84c",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 16px"}}></div>
        CONNECTING TO DATABASE...
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      </div>
    </div>
  );

  return (
    <div style={s.wrap}>
      {/* Header */}
      <div style={s.header}>
        <div>
          <div style={s.title}>MOVING <span style={s.gold}>&</span> TRACKING</div>
          <div style={s.sub}>BDL Status Board // Live Personnel Tracking</div>
        </div>
        <div style={s.clockWrap}>
          <div style={s.bhrClock}>{bhr}</div>
          <div style={s.bhrLabel}>BAHRAIN LOCAL</div>
          <div style={s.zuluClock}>ZULU: {zulu}</div>
          <div style={s.slotCount}>
            {filled}/100 FILLED
            {overdueCount>0&&<span style={{color:"#e74c3c",marginLeft:"10px"}}>⚠ {overdueCount} OVERDUE</span>}
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={s.tabs}>
        <button style={s.tab(tab==="board")} onClick={()=>setTab("board")}>Board</button>
        <button style={s.tab(tab==="locations")} onClick={()=>setTab("locations")}>Locations ({locations.length})</button>
      </div>

      <div style={s.body}>
        {tab==="board"&&<>
          {/* Status stats */}
          <div style={s.statsRow}>
            {STAT_DEFS.map(({key,label,color})=>{
              const count=key==="TOTAL"?filled:key==="OVERDUE"?overdueCount:(statusCounts[key]||0);
              return <div key={key} style={s.statCard(color)}>
                <div style={{width:7,height:7,borderRadius:"50%",background:count>0?color:"#2a3440",flexShrink:0,boxShadow:key==="OVERDUE"&&count>0?`0 0 6px ${color}`:undefined}}/>
                <div><div style={s.statNum(count>0?color:"#fff")}>{count}</div><div style={s.statLbl}>{label}</div></div>
              </div>;
            })}
          </div>

          {/* Location stats */}
          <div style={{...s.statsRow,marginBottom:"14px"}}>
            {locations.map((l,i)=>{
              const c=LOC_PALETTE[i%LOC_PALETTE.length],count=locCounts[l]||0;
              return <div key={l} style={s.statCard(c)}>
                <div style={{width:7,height:7,borderRadius:"50%",background:count>0?c:"#2a3440",flexShrink:0}}/>
                <div><div style={s.statNum(count>0?c:"#fff")}>{count}</div><div style={s.statLbl}>{l}</div></div>
              </div>;
            })}
          </div>

          {/* Overdue alert */}
          {overdueRows.length>0&&<div style={s.alert}>
            <div style={s.alertTitle}>⚠ OVERDUE PERSONNEL DETECTED</div>
            <div>{overdueRows.map((r,i)=><span key={i} style={s.alertTag}>{r.name} — {overdueStr(r)}</span>)}</div>
          </div>}

          {/* Table */}
          <div style={s.tableWrap}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr>{["#","Name","Location","Status","Due Back (BHR)","Notes"].map(h=><th key={h} style={s.th}>{h}</th>)}</tr></thead>
              <tbody>
                {rows.map((r,i)=>{
                  const od=isOverdue(r);
                  return <tr key={i} style={{background:od?"rgba(231,76,60,0.07)":"transparent",borderBottom:"1px solid rgba(30,38,48,0.7)"}}>
                    <td style={{...s.td,color:"#5a6a7a",fontSize:"11px",width:"28px"}}>{r.id}</td>
                    <td style={{...s.td,minWidth:"130px"}}>
                      <input style={s.inp} value={r.name} placeholder="—" onChange={e=>updateRow(i,"name",e.target.value.toUpperCase())} maxLength={25}/>
                      {od&&<><span style={s.overdueBadge}>OVRD</span><span style={s.overdueTime}>{overdueStr(r)}</span></>}
                    </td>
                    <td style={{...s.td,minWidth:"110px"}}>
                      <select style={s.sel(r.location,locColorMap)} value={r.location} onChange={e=>updateRow(i,"location",e.target.value)}>
                        <option value="">—</option>
                        {locations.map(l=><option key={l} value={l}>{l}</option>)}
                      </select>
                    </td>
                    <td style={{...s.td,minWidth:"100px"}}>
                      <select style={s.sel(r.status,STATUS_COLOR)} value={r.status} onChange={e=>updateRow(i,"status",e.target.value)}>
                        <option value="">—</option>
                        {STATUSES.map(st=><option key={st} value={st}>{st}</option>)}
                      </select>
                    </td>
                    <td style={s.td}>
                      <input type="time" style={s.timeInp(r.status==="IN"||r.status==="")} value={r.dueBack} disabled={r.status==="IN"||r.status===""} onChange={e=>updateRow(i,"dueBack",e.target.value)}/>
                    </td>
                    <td style={{...s.td,minWidth:"110px"}}>
                      <input style={s.notesInp} value={r.notes} placeholder="—" onChange={e=>updateRow(i,"notes",e.target.value)} maxLength={80}/>
                    </td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
          <div style={s.footer}>
            <span style={{color:"var(--green)"}}>⬤ LIVE</span>
            <span>ALL TIMES BAHRAIN // 100 SLOTS</span>
          </div>
        </>}

        {tab==="locations"&&<>
          <div style={{marginBottom:"16px",fontSize:"11px",color:"#5a6a7a",letterSpacing:"1px"}}>ADD OR REMOVE LOCATIONS — CHANGES APPLY INSTANTLY TO EVERYONE</div>
          <div style={s.addRow}>
            <input style={s.addInp} value={newLoc} placeholder="TYPE NEW LOCATION..." onChange={e=>setNewLoc(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&addLocation()} maxLength={20}/>
            <button style={s.addBtn} onClick={addLocation}>+ ADD</button>
          </div>
          <div style={{fontSize:"10px",color:"#5a6a7a",letterSpacing:"1px"}}>Press ADD or hit Enter.</div>
          <div style={{margin:"18px 0 10px",fontSize:"10px",color:"#c9a84c",letterSpacing:"3px"}}>CURRENT LOCATIONS ({locations.length})</div>
          <div style={s.locGrid}>
            {locations.map((l,i)=>{const c=LOC_PALETTE[i%LOC_PALETTE.length];return(
              <div key={l} style={s.locChip(c)}>
                <div style={{width:7,height:7,borderRadius:"50%",background:c,flexShrink:0}}/>
                {l}
                <button style={s.removeBtn} onClick={()=>removeLocation(l)}>✕</button>
              </div>
            );})}
          </div>
          <div style={{marginTop:"16px",background:"rgba(231,76,60,0.06)",border:"1px solid rgba(231,76,60,0.2)",padding:"10px 14px",fontSize:"11px",color:"#8a9aaa"}}>
            ⚠ Removing a location clears it from any personnel currently assigned to it.
          </div>
        </>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
